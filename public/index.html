<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple: #0d0d1a;
      --deep-purple-2: #12122a;
      --violet-neon: #7c3aed;
      --violet-glow: #a855f7;
      --pink-neon: #e879f9;
      --bg: var(--deep-purple);
      --bg-side: var(--deep-purple-2);
      --bg-chat: #1a1b2e;
      --bg-input: #2a2b40;
      --bg-dark: #08080f;
      --text: #e0e0e6;
      --text-muted: #949ba4;
      --green: #23a55a;
      --red: #f23f43;
      --radius: 8px;
      --glow: 0 0 8px rgba(168, 85, 247, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 72px 240px 1fr 240px;
      grid-template-rows: 100vh;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #hubs-column { grid-column: 1; background: var(--bg-side); }
    #spaces-column { grid-column: 2; background: var(--bg-side); }
    #chat-column { grid-column: 3; background: var(--bg-chat); display: flex; flex-direction: column; }
    #members-column { grid-column: 4; background: var(--bg-side); }

    /* ── Hubs ─────────────────────────────────────────────────────── */
    .hubs-list {
      display: flex; flex-direction: column;
      align-items: center; padding: 16px 0;
      gap: 8px;
    }

    .hub-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #3a3b5a;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      position: relative;
    }

    .hub-icon.active, .hub-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
      transform: scale(1.1);
    }

    .hub-icon img {
      width: 28px; height: 28px;
      border-radius: 50%;
    }

    .mp-icon {
      margin-top: 16px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #3a3b5a;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }

    .mp-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
    }

    /* ── Espaces ──────────────────────────────────────────────────── */
    .spaces-header {
      padding: 16px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      font-weight: 700;
      color: var(--text);
    }

    .spaces-list {
      padding: 8px 0;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .space-item {
      padding: 8px 16px;
      margin: 4px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex; align-items: center;
      gap: 8px;
    }

    .space-item:hover {
      background: rgba(168, 85, 247, 0.1);
      color: var(--text);
    }

    .space-item.active {
      background: var(--violet-neon);
      color: white;
      box-shadow: var(--glow);
    }

    /* ── Chat ─────────────────────────────────────────────────────── */
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      font-weight: 700;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }

    .messages-container {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex; gap: 12px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: rgba(168, 85, 247, 0.05);
      transition: background 0.2s;
    }

    .message:hover {
      background: rgba(168, 85, 247, 0.1);
    }

    .message-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
    }

    .message-author {
      font-weight: 500;
      color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .message-text {
      margin-top: 4px;
      color: var(--text);
      line-height: 1.4;
    }

    .chat-input {
      padding: 16px;
      background: var(--bg-chat);
      border-top: 1px solid rgba(168, 85, 247, 0.2);
    }

    .chat-input-area {
      width: 100%; padding: 12px 16px;
      background: var(--bg-input); border: 1.5px solid transparent;
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }

    .chat-input-area:focus {
      border-color: var(--violet-neon);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.3);
    }

    /* ── Soundboard ──────────────────────────────────────────────── */
    .soundboard-btn {
      position: fixed; bottom: 20px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--violet-neon);
      color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: var(--glow);
      font-size: 1.5rem;
      z-index: 100;
    }

    .soundboard-panel {
      position: fixed; bottom: 90px; right: 20px;
      background: var(--bg-side);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      display: none;
      gap: 8px;
      z-index: 100;
    }

    .sound-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--bg-input);
      color: var(--text);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sound-btn:hover {
      background: var(--violet-neon);
      color: white;
    }

    /* ── Membres ─────────────────────────────────────────────────── */
    .members-header {
      padding: 16px;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      font-weight: 700;
      color: var(--text);
    }

    .members-list {
      padding: 8px 0;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .member-item {
      padding: 8px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .member-item:hover {
      background: rgba(168, 85, 247, 0.1);
    }

    .member-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      position: relative;
    }

    .member-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      position: absolute; bottom: 0; right: 0;
      border: 2px solid var(--bg-side);
    }

    .member-status.online { background: var(--green); }
    .member-status.offline { background: var(--text-muted); }

    .member-name {
      flex: 1;
      color: var(--text);
      font-size: 0.9rem;
    }

    /* ── Auth ───────────────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }

    .auth-card {
      background: var(--bg-side);
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    .auth-card h1 {
      font-size: 1.8rem; font-weight: 700;
      color: var(--pink-neon);
      text-align: center; margin-bottom: 4px;
    }

    .auth-card p {
      text-align: center; color: var(--text-muted);
      margin-bottom: 28px; font-size: 0.9rem;
    }

    .auth-tabs {
      display: flex; margin-bottom: 24px;
      border-radius: var(--radius); overflow: hidden;
    }

    .auth-tab {
      flex: 1; padding: 10px; text-align: center;
      cursor: pointer; background: var(--bg-input);
      color: var(--text-muted); font-size: 0.9rem;
      font-weight: 500; transition: 0.2s;
    }

    .auth-tab.active {
      background: var(--violet-neon);
      color: white;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block; font-size: 0.75rem;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field input, .field select {
      width: 100%; padding: 12px 14px;
      background: var(--bg-input); border: 1.5px solid transparent;
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--violet-neon);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.3);
    }

    .field select option {
      background: var(--bg-input);
    }

    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--violet-neon); color: white;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
      box-shadow: var(--glow);
    }

    .btn-primary:hover {
      background: var(--violet-glow);
    }

    /* ── Profil ──────────────────────────────────────────────────── */
    .profile-panel {
      position: fixed; top: 0; right: 0;
      width: 280px; height: 100vh;
      background: var(--bg-side);
      transform: translateX(100%);
      transition: transform 0.3s;
      z-index: 150;
      padding: 16px;
      display: flex; flex-direction: column;
    }

    .profile-panel.open {
      transform: translateX(0);
    }

    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      position: relative;
    }

    .profile-status {
      width: 16px; height: 16px;
      border-radius: 50%;
      position: absolute; bottom: 0; right: 0;
      border: 3px solid var(--bg-side);
    }

    .profile-name {
      text-align: center;
      font-size: 1.2rem; font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .profile-pronouns {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .profile-section {
      margin-bottom: 24px;
    }

    .profile-section h3 {
      font-size: 0.8rem;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
      margin-bottom: 8px;
    }

    .profile-option {
      padding: 8px 0;
      color: var(--text);
      cursor: pointer;
      transition: color 0.2s;
    }

    .profile-option:hover {
      color: var(--pink-neon);
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1>NEXUS</h1>
      <p>Un espace inclusif pour discuter</p>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>

      <div id="login-form">
        <div class="field">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="login-btn">Se connecter</button>
      </div>

      <div id="register-form" style="display: none;">
        <div class="field">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="register-pronouns">Pronoms</label>
          <select id="register-pronouns">
            <option value="iel">iel</option>
            <option value="il">il</option>
            <option value="elle">elle</option>
            <option value="iel/il">iel/il</option>
            <option value="iel/elle">iel/elle</option>
            <option value="autre">autre</option>
          </select>
        </div>
        <button class="btn-primary" id="register-btn">S'inscrire</button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="hubs-column">
    <div class="hubs-list">
      <div class="hub-icon active">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Nexus" alt="Nexus Core">
      </div>
      <div class="hub-icon">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Dev" alt="Dev Hub">
      </div>
      <div class="mp-icon">💬</div>
    </div>
  </div>

  <div id="spaces-column">
    <div class="spaces-header">Nexus Core</div>
    <div class="spaces-list">
      <div class="space-item active"># général</div>
      <div class="space-item"># aide</div>
      <div class="space-item"># projets</div>
    </div>
  </div>

  <div id="chat-column">
    <div class="chat-header"># général</div>
    <div class="messages-container" id="messages-container"></div>
    <div class="chat-input">
      <input type="text" class="chat-input-area" id="chat-input" placeholder="Envoyer un message..." autocomplete="off">
    </div>
  </div>

  <div id="members-column">
    <div class="members-header">Membres - 3</div>
    <div class="members-list">
      <div class="member-item">
        <div class="member-avatar">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=LUWUANA" alt="LUWUANA">
          <div class="member-status online"></div>
        </div>
        <div class="member-name">LUWUANA</div>
      </div>
      <div class="member-item">
        <div class="member-avatar">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Alex" alt="Alex">
          <div class="member-status online"></div>
        </div>
        <div class="member-name">Alex</div>
      </div>
      <div class="member-item">
        <div class="member-avatar">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sam" alt="Sam">
          <div class="member-status offline"></div>
        </div>
        <div class="member-name">Sam</div>
      </div>
    </div>
  </div>

  <!-- Soundboard -->
  <div class="soundboard-btn" id="soundboard-btn">🎵</div>
  <div class="soundboard-panel" id="soundboard-panel">
    <button class="sound-btn" data-sound="1">1</button>
    <button class="sound-btn" data-sound="2">2</button>
    <button class="sound-btn" data-sound="3">3</button>
    <button class="sound-btn" data-sound="4">4</button>
    <button class="sound-btn" data-sound="5">5</button>
    <button class="sound-btn" data-sound="6">6</button>
  </div>

  <!-- Profile Panel -->
  <div class="profile-panel" id="profile-panel">
    <div class="profile-avatar">
      <img src="https://api.dicebear.com/7.x/bottts/svg?seed=LUWUANA" alt="Profil">
      <div class="profile-status online"></div>
    </div>
    <div class="profile-name">LUWUANA</div>
    <div class="profile-pronouns">iel</div>

    <div class="profile-section">
      <h3>Compte</h3>
      <div class="profile-option">Modifier le profil</div>
      <div class="profile-option">Paramètres</div>
    </div>

    <div class="profile-section">
      <h3>Nitro</h3>
      <div class="profile-option">Améliorer le serveur</div>
    </div>

    <div class="profile-section">
      <h3>Statut</h3>
      <div class="profile-option">En ligne</div>
      <div class="profile-option">Inactif</div>
      <div class="profile-option">Ne pas déranger</div>
      <div class="profile-option">Invisible</div>
    </div>

    <button class="btn-primary" id="logout-btn">Déconnexion</button>
  </div>

  <script>
    // Socket.io Logic
    const socket = io();
    let currentUser = null;
    let currentChannel = null;

    // Auth Tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('login-form').style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
      });
    });

    // Login
    document.getElementById('login-btn').addEventListener('click', () => {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      socket.emit('login', { username, password });
    });

    // Register
    document.getElementById('register-btn').addEventListener('click', () => {
      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const pronouns = document.getElementById('register-pronouns').value;
      socket.emit('register', { username, password, pronouns });
    });

    // Socket Events
    socket.on('auth-success', (user) => {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.querySelector('.profile-avatar img').src = user.avatar;
      document.querySelector('.profile-name').textContent = user.username;
      document.querySelector('.profile-pronouns').textContent = user.pronouns;
    });

    socket.on('new-message', (message) => {
      if (message.channel_id === currentChannel) {
        addMessageToChat(message);
      }
    });

    socket.on('channel-history', (messages) => {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';
      messages.forEach(addMessageToChat);
    });

    // Chat Input
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        socket.emit('send-message', {
          channel_id: currentChannel,
          content: e.target.value
        });
        e.target.value = '';
      }
    });

    // Soundboard
    document.getElementById('soundboard-btn').addEventListener('click', () => {
      const panel = document.getElementById('soundboard-panel');
      panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    });

    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const audio = new Audio(`/sounds/${btn.dataset.sound}.mp3`);
        audio.play();
      });
    });

    // Profile Panel
    document.querySelector('.profile-avatar').addEventListener('click', () => {
      document.getElementById('profile-panel').classList.toggle('open');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      socket.emit('logout');
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('profile-panel').classList.remove('open');
    });

    // Helper Functions
    function addMessageToChat(message) {
      const container = document.getElementById('messages-container');
      const messageElement = document.createElement('div');
      messageElement.className = 'message';
      messageElement.innerHTML = `
        <img src="${message.user.avatar}" alt="${message.user.username}" class="message-avatar">
        <div class="message-content">
          <div class="message-author">
            ${message.user.username} <span class="message-time">${new Date(message.created_at).toLocaleTimeString()}</span>
          </div>
          <div class="message-text">${message.content}</div>
        </div>
      `;
      container.appendChild(messageElement);
      container.scrollTop = container.scrollHeight;
    }
  </script>
</body>
</html>
