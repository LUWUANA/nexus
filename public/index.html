<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple: #0d0d1a;
      --deep-purple-2: #12122a;
      --violet-neon: #7c3aed;
      --violet-neon-2: #a855f7;
      --violet-neon-3: #e879f9;
      --bg: var(--deep-purple);
      --bg-side: var(--deep-purple-2);
      --bg-chat: #1a1b2e;
      --bg-input: #2a2b40;
      --bg-dark: #08080f;
      --text: #e0e0e6;
      --text-muted: #949ba4;
      --green: #23a55a;
      --red: #f23f43;
      --radius: 8px;
      --glow: 0 0 12px rgba(168, 85, 247, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 72px 240px 1fr 240px;
      grid-template-rows: 100vh;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #hubs-bar {
      background: var(--bg-side);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 8px;
      border-right: 1px solid rgba(124, 58, 237, 0.2);
    }

    #hubs-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .hub-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      margin: 0 auto;
    }

    .hub-icon.active, .hub-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
      border-radius: 30%;
    }

    .hub-icon::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 32px;
      background: var(--violet-neon);
      border-radius: 0 4px 4px 0;
      opacity: 0;
    }

    .hub-icon.active::after {
      opacity: 1;
    }

    #mp-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin: 8px auto 0;
    }

    #mp-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
    }

    #spaces-panel {
      background: var(--bg-side);
      border-right: 1px solid rgba(124, 58, 237, 0.2);
      padding: 16px;
      overflow-y: auto;
    }

    #spaces-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    #spaces-title {
      font-weight: 700;
      font-size: 16px;
    }

    #add-space {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    #add-space:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
    }

    #spaces-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .space-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .space-item:hover {
      background: rgba(124, 58, 237, 0.2);
    }

    .space-item.active {
      background: var(--violet-neon);
    }

    .space-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-input);
    }

    #chat-panel {
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 16px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-title {
      font-weight: 700;
      font-size: 16px;
    }

    #chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 12px;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-input);
      flex-shrink: 0;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-author {
      font-weight: 500;
      font-size: 14px;
    }

    .message-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.4;
    }

    #chat-input {
      padding: 16px;
      background: var(--bg-dark);
      border-top: 1px solid rgba(124, 58, 237, 0.2);
    }

    #message-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--bg-input);
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }

    #message-input:focus {
      box-shadow: var(--glow);
    }

    #members-panel {
      background: var(--bg-side);
      border-left: 1px solid rgba(124, 58, 237, 0.2);
      padding: 16px;
      overflow-y: auto;
    }

    #members-header {
      margin-bottom: 16px;
    }

    #members-title {
      font-weight: 700;
      font-size: 16px;
    }

    #members-search {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: var(--bg-input);
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      margin-top: 8px;
      outline: none;
    }

    #members-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .member-item:hover {
      background: rgba(124, 58, 237, 0.2);
    }

    .member-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-input);
    }

    .member-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .member-status.offline {
      background: var(--text-muted);
    }

    .member-status.idle {
      background: #f59e0b;
    }
  </style>
</head>
<body>
  <div id="hubs-bar">
    <div id="hubs-list"></div>
    <div id="mp-icon">💬</div>
  </div>

  <div id="spaces-panel">
    <div id="spaces-header">
      <div id="spaces-title">Espaces</div>
      <div id="add-space">+</div>
    </div>
    <div id="spaces-list"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <div id="chat-title"># général</div>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input">
      <input type="text" id="message-input" placeholder="Envoyer un message...">
    </div>
  </div>

  <div id="members-panel">
    <div id="members-header">
      <div id="members-title">Membres</div>
      <input type="text" id="members-search" placeholder="Rechercher...">
    </div>
    <div id="members-list"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const socket = io();
      let currentUser = null;
      let currentServer = null;
      let currentChannel = null;

      // ─── Auth ───────────────────────────────────────────────────────────────
      const token = localStorage.getItem('nexus_token');
      if (token) {
        socket.emit('authenticate', token);
      } else {
        const authModal = document.createElement('div');
        authModal.style.position = 'fixed';
        authModal.style.top = '0';
        authModal.style.left = '0';
        authModal.style.width = '100%';
        authModal.style.height = '100%';
        authModal.style.background = 'rgba(0, 0, 0, 0.8)';
        authModal.style.display = 'flex';
        authModal.style.alignItems = 'center';
        authModal.style.justifyContent = 'center';
        authModal.style.zIndex = '1000';

        authModal.innerHTML = `
          <div style="background: var(--bg-side); padding: 32px; border-radius: var(--radius); width: 320px;">
            <h2 style="margin-bottom: 16px; text-align: center;">Bienvenue sur NEXUS</h2>
            <div style="display: flex; flex-direction: column; gap: 16px;">
              <input id="username-input" type="text" placeholder="Pseudo" style="padding: 12px; border-radius: var(--radius); background: var(--bg-input); border: none; color: var(--text);">
              <input id="password-input" type="password" placeholder="Mot de passe" style="padding: 12px; border-radius: var(--radius); background: var(--bg-input); border: none; color: var(--text);">
              <input id="pronouns-input" type="text" placeholder="Pronoms (optionnel)" style="padding: 12px; border-radius: var(--radius); background: var(--bg-input); border: none; color: var(--text);">
              <button id="login-btn" style="padding: 12px; border-radius: var(--radius); background: var(--violet-neon); border: none; color: white; font-weight: 500; cursor: pointer;">Se connecter</button>
              <button id="register-btn" style="padding: 12px; border-radius: var(--radius); background: var(--bg-input); border: none; color: var(--text); font-weight: 500; cursor: pointer;">Créer un compte</button>
            </div>
          </div>
        `;

        document.body.appendChild(authModal);

        document.getElementById('login-btn').addEventListener('click', () => {
          const username = document.getElementById('username-input').value;
          const password = document.getElementById('password-input').value;
          socket.emit('login', { username, password });
        });

        document.getElementById('register-btn').addEventListener('click', () => {
          const username = document.getElementById('username-input').value;
          const password = document.getElementById('password-input').value;
          const pronouns = document.getElementById('pronouns-input').value;
          socket.emit('register', { username, password, pronouns });
        });
      }

      // ─── Socket Events ──────────────────────────────────────────────────────
      socket.on('authenticated', (user) => {
        currentUser = user;
        localStorage.setItem('nexus_token', user.token);
        document.querySelector('.auth-modal')?.remove();
        loadServers();
      });

      socket.on('login_error', (error) => {
        alert(error);
      });

      socket.on('register_error', (error) => {
        alert(error);
      });

      // ─── Servers ────────────────────────────────────────────────────────────
      function loadServers() {
        socket.emit('get_servers');
      }

      socket.on('servers', (servers) => {
        const hubsList = document.getElementById('hubs-list');
        hubsList.innerHTML = '';

        servers.forEach(server => {
          const hubIcon = document.createElement('div');
          hubIcon.className = 'hub-icon';
          hubIcon.innerHTML = server.icon ? `<img src="${server.icon}" style="width: 100%; height: 100%; border-radius: 50%;">` : server.name.charAt(0);
          hubIcon.addEventListener('click', () => {
            document.querySelectorAll('.hub-icon').forEach(icon => icon.classList.remove('active'));
            hubIcon.classList.add('active');
            currentServer = server.id;
            loadChannels(server.id);
          });
          hubsList.appendChild(hubIcon);
        });
      });

      // ─── Channels ───────────────────────────────────────────────────────────
      function loadChannels(serverId) {
        socket.emit('get_channels', serverId);
      }

      socket.on('channels', (channels) => {
        const spacesList = document.getElementById('spaces-list');
        spacesList.innerHTML = '';

        channels.forEach(channel => {
          const spaceItem = document.createElement('div');
          spaceItem.className = 'space-item';
          spaceItem.innerHTML = `<div class="space-icon">#</div><div>${channel.name}</div>`;
          spaceItem.addEventListener('click', () => {
            document.querySelectorAll('.space-item').forEach(item => item.classList.remove('active'));
            spaceItem.classList.add('active');
            currentChannel = channel.id;
            loadMessages(channel.id);
            document.getElementById('chat-title').textContent = `# ${channel.name}`;
          });
          spacesList.appendChild(spaceItem);
        });
      });

      // ─── Messages ───────────────────────────────────────────────────────────
      function loadMessages(channelId) {
        socket.emit('get_messages', channelId);
      }

      socket.on('messages', (messages) => {
        const chatMessages = document.getElementById('chat-messages');
        chatMessages.innerHTML = '';

        messages.forEach(message => {
          const messageElement = document.createElement('div');
          messageElement.className = 'message';
          messageElement.innerHTML = `
            <img src="${message.avatar}" class="message-avatar">
            <div class="message-content">
              <div class="message-header">
                <div class="message-author">${message.username}</div>
                <div class="message-time">${new Date(message.created_at).toLocaleTimeString()}</div>
              </div>
              <div class="message-text">${message.content}</div>
            </div>
          `;
          chatMessages.appendChild(messageElement);
        });

        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      // ─── Send Message ─────────────────────────────────────────────────────
      const messageInput = document.getElementById('message-input');
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && messageInput.value.trim() && currentChannel) {
          socket.emit('send_message', {
            channelId: currentChannel,
            content: messageInput.value.trim()
          });
          messageInput.value = '';
        }
      });

      // ─── Members ───────────────────────────────────────────────────────────
      function loadMembers(serverId) {
        socket.emit('get_members', serverId);
      }

      socket.on('members', (members) => {
        const membersList = document.getElementById('members-list');
        membersList.innerHTML = '';

        members.forEach(member => {
          const memberItem = document.createElement('div');
          memberItem.className = 'member-item';
          memberItem.innerHTML = `
            <img src="${member.avatar}" class="member-avatar">
            <div>${member.username}</div>
            <div class="member-status ${member.status}"></div>
          `;
          membersList.appendChild(memberItem);
        });
      });
    });
  </script>
</body>
</html>
