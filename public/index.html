<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple-bg: #0d0d1a;
      --sidebar-bg: #12122a;
      --chat-bg: #0f0f1e;
      --user-bar-bg: #0a0a14; /* Also for server list background */
      --card-bg: rgba(30, 20, 60, 0.85);
      --border-neon: rgba(167, 139, 250, 0.3);
      --neon-primary: #7c3aed; /* Violet principal */
      --neon-secondary: #a855f7; /* Violet secondaire */
      --neon-accent: #e879f9; /* Rose/violet accent */
      --text-light: #e2e8f0; /* Updated from #dbdee1 */
      --text-muted: #949ba4;
      --status-online: #23a55a;
      --status-offline: #949ba4;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-glow: 0 0 20px rgba(167,139,250,.8), 0 0 40px rgba(110,87,255,.5);
      --shadow-card: 0 0 60px rgba(110, 87, 255, 0.2), 0 24px 64px rgba(0,0,0,.6);
      --shadow-active-channel: 0 0 10px var(--neon-primary);
      --message-bubble-bg: rgba(124, 58, 237, 0.15); /* A light primary violet tint */
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--deep-purple-bg);
      color: var(--text-light);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 60%, #0a0a14 100%);
    }

    /* ── Auth Overlay ─────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-neon);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 460px;
      box-shadow: var(--shadow-card);
    }
    .auth-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 2.4rem; font-weight: 700;
      color: var(--neon-secondary);
      text-shadow: var(--shadow-glow);
      letter-spacing: .05em;
    }
    .auth-sub {
      text-align: center; color: var(--text-muted); font-size: .9rem; margin-bottom: 32px; line-height: 1.5;
    }

    .auth-tabs {
      display: flex; margin-bottom: 28px; border-radius: var(--radius-sm); overflow: hidden; gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,.05); color: var(--text-muted);
      font-size: .9rem; font-weight: 500; border-radius: var(--radius-sm);
      transition: .2s ease;
    }
    .auth-tab.active {
      background: var(--neon-primary); color: #fff;
      box-shadow: 0 0 15px var(--neon-primary);
    }

    .auth-field { margin-bottom: 16px; }
    .auth-field label {
      display: block; font-size: .85rem; color: var(--text-muted); margin-bottom: 8px;
    }
    .auth-field input, .auth-field select {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border-neon);
      border-radius: var(--radius-sm); background: rgba(255,255,255,.05);
      color: var(--text-light); font-size: 1rem;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .auth-field input:focus, .auth-field select:focus {
      outline: none; border-color: var(--neon-primary);
      box-shadow: 0 0 10px var(--neon-primary);
    }
    .auth-submit-btn {
      width: 100%; padding: 14px; background: var(--neon-primary);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      transition: background .2s ease, box-shadow .2s ease;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
    }
    .auth-submit-btn:hover {
      background: var(--neon-secondary);
      box-shadow: 0 0 20px var(--neon-secondary);
    }
    .auth-panel.hidden { display: none; }

    /* ── Main App Layout ──────────────────────────────────────────── */
    #app {
      display: flex; height: 100vh; width: 100vw;
      background: var(--deep-purple-bg);
    }
    #app.hidden { display: none; }

    /* Server Sidebar */
    #server-sidebar {
      width: 72px; flex-shrink: 0;
      background: var(--user-bar-bg); /* Darker background for server list */
      padding: 12px 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px;
      overflow-y: auto;
    }
    #server-list {
      display: flex; flex-direction: column; gap: 8px;
      width: 100%;
    }
    .server-item {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,.05); color: var(--text-light);
      display: flex; justify-content: center; align-items: center;
      font-weight: 700; font-size: .8rem; cursor: pointer;
      transition: border-radius .2s ease, background .2s ease, box-shadow .2s ease;
      margin: 0 auto;
      border: 2px solid transparent;
    }
    .server-item:hover {
      border-radius: 30%;
      background: var(--neon-primary);
      box-shadow: 0 0 15px var(--neon-primary);
    }
    .server-item.active {
      border-radius: 30%;
      background: var(--neon-primary);
      box-shadow: 0 0 20px var(--neon-primary);
      border-color: var(--neon-accent);
    }

    /* Channel Sidebar */
    #channel-sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,.05);
    }
    #channel-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: var(--text-light);
      font-size: 1.1rem; font-weight: 700;
    }
    #channel-list {
      flex-grow: 1; overflow-y: auto;
      padding: 12px 8px;
    }
    .channel-category {
      color: var(--text-muted); font-size: .75rem; font-weight: 700;
      text-transform: uppercase; margin: 16px 8px 8px;
    }
    .channel-item {
      padding: 8px 12px; margin-bottom: 4px;
      color: var(--text-muted); font-size: .95rem;
      border-radius: var(--radius-sm); cursor: pointer;
      transition: background .2s ease, color .2s ease, box-shadow .2s ease;
    }
    .channel-item:hover {
      background: rgba(255,255,255,.08);
      color: var(--text-light);
    }
    .channel-item.active {
      background: var(--neon-primary);
      color: #fff;
      box-shadow: var(--shadow-active-channel);
    }

    /* User Panel */
    #user-panel {
      background: var(--user-bar-bg);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .user-info {
      display: flex; align-items: center;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      margin-right: 10px; background: var(--neon-secondary);
    }
    .username {
      font-weight: 700; color: var(--text-light);
    }
    .user-actions button {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; margin-left: 8px;
      transition: color .2s ease;
    }
    .user-actions button:hover {
      color: var(--neon-primary);
    }

    /* Main Chat Area */
    #main-chat {
      flex-grow: 1; display: flex; flex-direction: column;
      background: var(--chat-bg);
    }
    #chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center;
      color: var(--text-light);
    }
    #chat-header h3 {
      font-size: 1.2rem; font-weight: 700; margin-right: 12px;
    }
    #chat-header .online-users {
      font-size: .85rem; color: var(--text-muted);
    }

    #message-list {
      flex-grow: 1; overflow-y: auto;
      padding: 20px 24px;
    }
    .message {
      display: flex; margin-bottom: 16px;
      align-items: flex-start;
    }
    .message-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      margin-right: 12px; flex-shrink: 0;
      background: var(--neon-accent);
    }
    .message-content {
      flex-grow: 1;
    }
    .message-author {
      font-weight: 700; color: var(--text-light); margin-bottom: 4px;
      display: flex; align-items: baseline;
    }
    .message-timestamp {
      font-size: .75rem; color: var(--text-muted); margin-left: 8px;
      font-weight: 400;
    }
    .message-text {
      background: var(--message-bubble-bg);
      padding: 10px 14px; border-radius: var(--radius-md);
      color: var(--text-light); line-height: 1.4;
      max-width: 70%; /* Limit bubble width */
      word-wrap: break-word;
    }
    .message.self .message-text {
      background: rgba(168, 85, 247, 0.2); /* Slightly different tint for self messages */
      margin-left: auto; /* Align self messages to the right */
    }
    .message.self {
      flex-direction: row-reverse; /* Reverse order for self messages */
    }
    .message.self .message-avatar {
      margin-left: 12px; margin-right: 0;
    }
    .message.self .message-author {
      justify-content: flex-end;
    }
    .message.self .message-timestamp {
      margin-left: 0; margin-right: 8px;
    }

    /* Chat Input Area */
    #chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex; gap: 12px;
    }
    #chat-input {
      flex-grow: 1; padding: 12px 16px;
      border: 1px solid var(--border-neon);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.05);
      color: var(--text-light); font-size: 1rem;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    #chat-input::placeholder {
      color: var(--text-muted);
    }
    #chat-input:focus {
      outline: none; border-color: var(--neon-primary);
      box-shadow: 0 0 15px var(--neon-primary);
    }
    #send-message-btn {
      background: var(--neon-primary); color: #fff;
      border: none; border-radius: var(--radius-md);
      padding: 12px 20px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s ease, box-shadow .2s ease;
      box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
    }
    #send-message-btn:hover {
      background: var(--neon-secondary);
      box-shadow: 0 0 15px var(--neon-secondary);
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--deep-purple-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-primary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--neon-secondary);
    }
  </style>
</head>
<body>

  <div id="auth-overlay">
    <div class="auth-card">
      <h1 class="auth-logo">NEXUS</h1>
      <p class="auth-sub">Connectez-vous ou créez un compte pour rejoindre la communauté.</p>

      <div class="auth-tabs">
        <div id="login-tab" class="auth-tab active">Connexion</div>
        <div id="register-tab" class="auth-tab">Inscription</div>
      </div>

      <div id="login-panel" class="auth-panel">
        <form id="login-form">
          <div class="auth-field">
            <label for="login-username">Pseudo</label>
            <input type="text" id="login-username" name="username" required>
          </div>
          <div class="auth-field">
            <label for="login-password">Mot de passe</label>
            <input type="password" id="login-password" name="password" required>
          </div>
          <button type="submit" class="auth-submit-btn">Se connecter</button>
        </form>
      </div>

      <div id="register-panel" class="auth-panel hidden">
        <form id="register-form">
          <div class="auth-field">
            <label for="register-username">Pseudo</label>
            <input type="text" id="register-username" name="username" required>
          </div>
          <div class="auth-field">
            <label for="register-password">Mot de passe</label>
            <input type="password" id="register-password" name="password" required>
          </div>
          <div class="auth-field">
            <label for="register-pronouns">Pronoms (optionnel)</label>
            <select id="register-pronouns" name="pronouns">
              <option value="iel">iel</option>
              <option value="il">il</option>
              <option value="elle">elle</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <button type="submit" class="auth-submit-btn">S'inscrire</button>
        </form>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="server-sidebar">
      <div id="server-list">
        <div class="server-item active">NEXUS</div>
        <div class="server-item">S2</div>
        <div class="server-item">S3</div>
      </div>
    </div>
    <div id="channel-sidebar">
      <div id="channel-header">
        <h2>NEXUS Core</h2>
      </div>
      <div id="channel-list">
        <div class="channel-category">Text Channels</div>
        <div class="channel-item active" data-channel-id="1"># general</div>
        <div class="channel-item" data-channel-id="2"># random</div>
        <div class="channel-item" data-channel-id="3"># dev</div>
        <div class="channel-category">Voice Channels</div>
        <div class="channel-item" data-channel-id="4">🔊 General Voice</div>
      </div>
      <div id="user-panel">
        <div class="user-info">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=User" alt="User Avatar" class="user-avatar">
          <span class="username">User</span>
        </div>
        <div class="user-actions">
          <button class="settings-btn">⚙️</button>
          <button class="logout-btn">🚪</button>
        </div>
      </div>
    </div>
    <div id="main-chat">
      <div id="chat-header">
        <h3># general</h3>
        <span class="online-users">2 online</span>
      </div>
      <div id="message-list">
        <!-- Example messages -->
        <div class="message">
          <img class="message-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Alice" alt="Alice">
          <div class="message-content">
            <div class="message-author">Alice <span class="message-timestamp">10:30 AM</span></div>
            <div class="message-text">Hello everyone!</div>
          </div>
        </div>
        <div class="message self">
          <img class="message-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=User" alt="User">
          <div class="message-content">
            <div class="message-author">User <span class="message-timestamp">10:31 AM</span></div>
            <div class="message-text">Hi Alice! Welcome to NEXUS.</div>
          </div>
        </div>
      </div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Message #general">
        <button id="send-message-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const socket = io();

      // Auth elements
      const authOverlay = document.getElementById('auth-overlay');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginTab = document.getElementById('login-tab');
      const registerTab = document.getElementById('register-tab');
      const loginPanel = document.getElementById('login-panel');
      const registerPanel = document.getElementById('register-panel');

      // App elements
      const appContainer = document.getElementById('app');
      const channelListContainer = document.getElementById('channel-list'); // Renamed to avoid conflict with channelList variable
      const messageList = document.getElementById('message-list');
      const chatInput = document.getElementById('chat-input');
      const sendMessageBtn = document.getElementById('send-message-btn');
      const chatHeader = document.getElementById('chat-header');
      const currentChannelNameDisplay = chatHeader.querySelector('h3');
      const userPanelUsername = document.querySelector('#user-panel .username');
      const userPanelAvatar = document.querySelector('#user-panel .user-avatar');

      let currentChannelId = null;
      let currentUser = null;
      let token = localStorage.getItem('nexus_token');

      // --- Auth Logic ---
      function showAuth() {
        authOverlay.classList.remove('hidden');
        appContainer.classList.add('hidden');
      }

      function hideAuth() {
        authOverlay.classList.add('hidden');
        appContainer.classList.remove('hidden');
      }

      if (token) {
        socket.emit('authenticate', token);
      } else {
        showAuth();
      }

      // --- Socket.io Logic ---
      socket.on('connect', () => {
        console.log('Connected to Socket.io');
        if (token) {
          socket.emit('authenticate', token);
        }
      });

      socket.on('authenticated', (user) => {
        currentUser = user;
        hideAuth();
        if (userPanelUsername) userPanelUsername.textContent = user.username;
        if (userPanelAvatar) userPanelAvatar.src = user.avatar;
        socket.emit('get_servers');
      });

      socket.on('unauthorized', () => {
        console.log('Unauthorized, clearing token');
        localStorage.removeItem('nexus_token');
        showAuth();
      });

      socket.on('servers_list', (servers) => {
        // This is a placeholder. In a real app, this would populate #server-list and #channel-list
        // For now, we'll just auto-join the first channel of the first server if available.
        const serverListDiv = document.getElementById('server-list');
        serverListDiv.innerHTML = '';
        if (servers.length > 0) {
          servers.forEach(server => {
            const serverItem = document.createElement('div');
            serverItem.classList.add('server-item');
            serverItem.textContent = server.name.substring(0, 2).toUpperCase(); // Display first two letters
            serverItem.dataset.serverId = server.id;
            serverItem.addEventListener('click', () => {
              // Logic to load channels for this server
              socket.emit('get_channels', server.id);
              document.querySelectorAll('.server-item').forEach(item => item.classList.remove('active'));
              serverItem.classList.add('active');
              currentChannelNameDisplay.textContent = 'Select a channel';
              messageList.innerHTML = '';
            });
            serverListDiv.appendChild(serverItem);
          });
          // Auto-select first server and load its channels
          if (serverListDiv.firstElementChild) {
            serverListDiv.firstElementChild.classList.add('active');
            socket.emit('get_channels', servers[0].id);
          }
        }
      });

      socket.on('channels_list', (channels) => {
        const channelListDiv = document.getElementById('channel-list');
        channelListDiv.innerHTML = '<div class="channel-category">Text Channels</div>'; // Clear and add category
        if (channels.length > 0) {
          channels.forEach(channel => {
            const channelItem = document.createElement('div');
            channelItem.classList.add('channel-item');
            channelItem.textContent = `# ${channel.name}`;
            channelItem.dataset.channelId = channel.id;
            channelItem.addEventListener('click', () => {
              joinChannel(channel.id, channel.name);
            });
            channelListDiv.appendChild(channelItem);
          });
          // Auto-join first channel if available
          joinChannel(channels[0].id, channels[0].name);
        }
      });

      socket.on('channel_history', (messages) => {
        messageList.innerHTML = ''; // Clear previous messages
        messages.forEach(addMessageToChat);
        messageList.scrollTop = messageList.scrollHeight;
      });

      socket.on('new_message', (message) => {
        if (message.channel_id === currentChannelId) {
          addMessageToChat(message);
          messageList.scrollTop = messageList.scrollHeight;
        }
      });

      function joinChannel(channelId, channelName) {
        if (currentChannelId) {
          socket.emit('leave_channel', currentChannelId);
        }
        currentChannelId = channelId;
        socket.emit('join_channel', channelId);
        currentChannelNameDisplay.textContent = `# ${channelName}`;
        chatInput.placeholder = `Message #${channelName}`;
        // Update active channel in UI
        document.querySelectorAll('.channel-item').forEach(item => {
          item.classList.remove('active');
          if (item.dataset.channelId == channelId) {
            item.classList.add('active');
          }
        });
      }

      function addMessageToChat(message) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        if (currentUser && message.user_id === currentUser.id) {
          messageDiv.classList.add('self');
        }
        const timestamp = new Date(message.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `
          <img class="message-avatar" src="${message.avatar}" alt="${message.username}">
          <div class="message-content">
            <div class="message-author">${message.username} <span class="message-timestamp">${timestamp}</span></div>
            <div class="message-text">${message.content}</div>
          </div>
        `;
        messageList.appendChild(messageDiv);
      }

      sendMessageBtn.addEventListener('click', () => {
        const content = chatInput.value.trim();
        if (content && currentChannelId) {
          socket.emit('send_message', { channel_id: currentChannelId, content: content });
          chatInput.value = '';
        }
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          sendMessageBtn.click();
        }
      });

      // Dummy login/register forms (to make the auth overlay functional)
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = loginForm.querySelector('#login-username').value;
        const password = loginForm.querySelector('#login-password').value;
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('nexus_token', data.token);
            token = data.token;
            socket.emit('authenticate', token);
          } else {
            alert(data.error);
          }
        } catch (error) {
          console.error('Login error:', error);
          alert('Login failed');
        }
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = registerForm.querySelector('#register-username').value;
        const password = registerForm.querySelector('#register-password').value;
        const pronouns = registerForm.querySelector('#register-pronouns').value;
        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, pronouns })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('nexus_token', data.token);
            token = data.token;
            socket.emit('authenticate', token);
          } else {
            alert(data.error);
          }
        } catch (error) {
          console.error('Register error:', error);
          alert('Registration failed');
        }
      });

      loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginPanel.classList.remove('hidden');
        registerPanel.classList.add('hidden');
      });

      registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerPanel.classList.remove('hidden');
        loginPanel.classList.add('hidden');
      });

      // Initial state for auth tabs
      loginTab.click();

      // Logout button logic
      const logoutBtn = document.querySelector('.logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('nexus_token');
          currentUser = null;
          token = null;
          socket.disconnect(); // Disconnect and reconnect to clear session
          socket.connect();
          showAuth();
        });
      }
    });
  </script>
</body>
</html>
