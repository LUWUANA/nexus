<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Hubs Inclusifs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --input-bg: #1e1e2e;
      --input-text: #dbdee1;
      --input-placeholder: #6c7284;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #0d0d1a, #1a0a2e, #0d1a2e, #1a0a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(168, 85, 247, 0.5);
      border-radius: 50%;
      opacity: 0;
      animation: float 15s infinite ease-in;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    #auth-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .nexus-logo {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: var(--glow-active);
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: var(--glow-active); }
      to { text-shadow: 0 0 20px var(--pink-neon); }
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      background: rgba(30, 30, 46, 0.6);
      border-radius: 8px;
      padding: 4px;
    }

    .auth-tab {
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 6px;
      color: var(--text-secondary);
      transition: all 0.3s;
    }

    .auth-tab.active {
      background: var(--violet-neon);
      color: white;
    }

    .auth-container {
      background: rgba(30, 30, 46, 0.8);
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .form-group input {
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 6px;
      color: var(--input-text);
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--violet-neon);
      box-shadow: var(--glow);
    }

    .form-group input::placeholder {
      color: var(--input-placeholder);
    }

    .auth-button {
      padding: 12px;
      background: var(--violet-neon);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-button:hover {
      background: var(--pink-neon);
      box-shadow: var(--glow-active);
    }

    .auth-footer {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .auth-footer a {
      color: var(--violet-neon);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles-js"></div>

  <div id="auth-overlay">
    <h1 class="nexus-logo">NEXUS</h1>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Connexion</div>
      <div class="auth-tab" data-tab="register">Inscription</div>
    </div>
    <div class="auth-container">
      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" required>
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" required>
        </div>
        <button type="submit" class="auth-button">Se connecter</button>
      </form>
      <form class="auth-form" id="register-form" style="display: none;">
        <div class="form-group">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" required>
        </div>
        <div class="form-group">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" required>
        </div>
        <div class="form-group">
          <label for="register-pronouns">Pronoms (optionnel)</label>
          <input type="text" id="register-pronouns" placeholder="iel / iels / il / elle / ...">
        </div>
        <button type="submit" class="auth-button">S'inscrire</button>
      </form>
      <div class="auth-footer">
        En vous inscrivant, vous acceptez nos <a href="#">Conditions d'utilisation</a>.
      </div>
    </div>
  </div>

  <div id="app" style="display: none;">
    <div class="sidebar">
      <div class="server-list"></div>
      <div class="user-profile"></div>
    </div>
    <div class="main-content">
      <div class="channel-header"></div>
      <div class="message-list"></div>
      <div class="message-input"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const socket = io();
      const authOverlay = document.getElementById('auth-overlay');
      const app = document.getElementById('app');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const authTabs = document.querySelectorAll('.auth-tab');

      // Gestion des onglets auth
      authTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          authTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('login-form').style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
          document.getElementById('register-form').style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
        });
      });

      // Vérification du token au chargement
      const token = localStorage.getItem('nexus_token');
      if (token) {
        authOverlay.style.display = 'none';
        app.style.display = 'grid';
        socket.emit('auth', { token });
        loadServers();
      }

      // Login
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await response.json();

          if (data.error) {
            alert(data.error);
            return;
          }

          localStorage.setItem('nexus_token', data.token);
          authOverlay.style.display = 'none';
          app.style.display = 'grid';
          socket.emit('auth', { token: data.token });
          loadServers();
        } catch (err) {
          console.error('Erreur de connexion:', err);
          alert('Erreur de connexion');
        }
      });

      // Register
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const pronouns = document.getElementById('register-pronouns').value;

        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, pronouns })
          });
          const data = await response.json();

          if (data.error) {
            alert(data.error);
            return;
          }

          localStorage.setItem('nexus_token', data.token);
          authOverlay.style.display = 'none';
          app.style.display = 'grid';
          socket.emit('auth', { token: data.token });
          loadServers();
        } catch (err) {
          console.error('Erreur d\'inscription:', err);
          alert('Erreur d\'inscription');
        }
      });

      // Charger les serveurs et rejoindre le premier salon texte
      async function loadServers() {
        try {
          const response = await fetch('/api/servers', {
            headers: {
              'Authorization': `Bearer ${localStorage.getItem('nexus_token')}`
            }
          });
          const servers = await response.json();

          if (servers.length > 0) {
            const firstServer = servers[0];
            const channelsResponse = await fetch(`/api/servers/${firstServer.id}/channels`, {
              headers: {
                'Authorization': `Bearer ${localStorage.getItem('nexus_token')}`
              }
            });
            const channels = await channelsResponse.json();
            const firstTextChannel = channels.find(channel => channel.type === 'text');

            if (firstTextChannel) {
              socket.emit('join_channel', { channelId: firstTextChannel.id });
            }
          }
        } catch (err) {
          console.error('Erreur lors du chargement des serveurs:', err);
        }
      }
    });
  </script>
</body>
</html>
