<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Hubs Inclusifs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #0d0d1a, #1a0a2e, #0d1a2e, #1a0a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(168, 85, 247, 0.5);
      border-radius: 50%;
      opacity: 0;
      animation: float 15s infinite ease-in;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .auth-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .nexus-logo {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: var(--glow-active);
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: var(--glow-active); }
      to { text-shadow: 0 0 20px var(--pink-neon); }
    }

    .welcome-message {
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      text-align: center;
      max-width: 500px;
    }

    .auth-container {
      background: rgba(20, 20, 40, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 16px;
      padding: 40px;
      width: 500px;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.2);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, var(--violet-neon), var(--pink-neon));
      z-index: -1;
      border-radius: 18px;
      animation: borderGlow 3s linear infinite;
    }

    @keyframes borderGlow {
      0% { clip-path: polygon(0% 0%, 0% 100%, 25% 100%, 25% 25%, 75% 25%, 75% 75%, 25% 75%, 25% 100%, 100% 100%, 100% 0%); }
      100% { clip-path: polygon(0% 0%, 0% 100%, 100% 100%, 100% 75%, 75% 75%, 75% 25%, 25% 25%, 25% 75%, 75% 75%, 75% 100%, 100% 100%, 100% 0%); }
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      position: relative;
    }

    .auth-tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }

    .auth-tab.active {
      color: var(--violet-neon);
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      position: relative;
    }

    .auth-input {
      width: 100%;
      background-color: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 12px;
      padding: 16px 16px 16px 48px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--violet-neon);
      box-shadow: var(--glow-active);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .auth-input:focus + .input-icon {
      color: var(--violet-neon);
    }

    .pronouns-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .pronoun-badge {
      background-color: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 20px;
      padding: 8px 16px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pronoun-badge.active {
      background-color: var(--violet-neon);
      color: white;
      border-color: var(--violet-neon);
    }

    .auth-button {
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      box-shadow: var(--glow);
    }

    .auth-button:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow-active);
    }

    .auth-button:active {
      transform: translateY(0);
    }

    .error-message {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: -16px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="auth-screen">
    <h1 class="nexus-logo">NEXUS</h1>
    <p class="welcome-message">Bienvenue dans le hub inclusif où chaque voix compte. Rejoins une communauté qui célèbre la diversité.</p>
    
    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>
      
      <div class="auth-form" id="login-form">
        <div class="form-group">
          <input type="text" class="auth-input" id="login-username" placeholder="Pseudo" required>
          <i class="fas fa-user input-icon"></i>
        </div>
        <div class="form-group">
          <input type="password" class="auth-input" id="login-password" placeholder="Mot de passe" required>
          <i class="fas fa-lock input-icon"></i>
        </div>
        <div class="error-message" id="login-error"></div>
        <button class="auth-button" id="login-submit">Se connecter</button>
      </div>
      
      <div class="auth-form" id="register-form" style="display: none;">
        <div class="form-group">
          <input type="text" class="auth-input" id="register-username" placeholder="Pseudo (2-32 caractères)" required>
          <i class="fas fa-user input-icon"></i>
        </div>
        <div class="form-group">
          <input type="password" class="auth-input" id="register-password" placeholder="Mot de passe" required>
          <i class="fas fa-lock input-icon"></i>
        </div>
        <div class="form-group">
          <input type="password" class="auth-input" id="register-confirm-password" placeholder="Confirmer le mot de passe" required>
          <i class="fas fa-lock input-icon"></i>
        </div>
        <div class="form-group">
          <div style="color: var(--text-secondary); margin-bottom: 8px;">Tes pronoms :</div>
          <div class="pronouns-selector">
            <div class="pronoun-badge active" data-pronoun="iel">iel</div>
            <div class="pronoun-badge" data-pronoun="il">il</div>
            <div class="pronoun-badge" data-pronoun="elle">elle</div>
            <div class="pronoun-badge" data-pronoun="iel/il">iel/il</div>
            <div class="pronoun-badge" data-pronoun="iel/elle">iel/elle</div>
            <div class="pronoun-badge" data-pronoun="autre">autre</div>
          </div>
        </div>
        <div class="error-message" id="register-error"></div>
        <button class="auth-button" id="register-submit">Entrer dans le Nexus</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Particles effect
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 8 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = Math.random() * 10 + 10 + 's';
        particlesContainer.appendChild(particle);
      }

      // Tab switching
      const tabs = document.querySelectorAll('.auth-tab');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          if (tab.dataset.tab === 'login') {
            loginForm.style.display = 'flex';
            registerForm.style.display = 'none';
          } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'flex';
          }
        });
      });

      // Pronouns selector
      const pronounBadges = document.querySelectorAll('.pronoun-badge');
      pronounBadges.forEach(badge => {
        badge.addEventListener('click', () => {
          pronounBadges.forEach(b => b.classList.remove('active'));
          badge.classList.add('active');
        });
      });

      // Login functionality
      const loginSubmit = document.getElementById('login-submit');
      const loginUsername = document.getElementById('login-username');
      const loginPassword = document.getElementById('login-password');
      const loginError = document.getElementById('login-error');
      
      loginSubmit.addEventListener('click', async () => {
        loginError.textContent = '';
        
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: loginUsername.value,
            password: loginPassword.value
          })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('nexus_token', data.token);
          window.location.reload();
        } else {
          loginError.textContent = data.error || 'Échec de la connexion';
        }
      });

      // Register functionality
      const registerSubmit = document.getElementById('register-submit');
      const registerUsername = document.getElementById('register-username');
      const registerPassword = document.getElementById('register-password');
      const registerConfirmPassword = document.getElementById('register-confirm-password');
      const registerError = document.getElementById('register-error');
      
      registerSubmit.addEventListener('click', async () => {
        registerError.textContent = '';
        
        if (registerPassword.value !== registerConfirmPassword.value) {
          registerError.textContent = 'Les mots de passe ne correspondent pas';
          return;
        }
        
        const selectedPronoun = document.querySelector('.pronoun-badge.active').dataset.pronoun;
        
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: registerUsername.value,
            password: registerPassword.value,
            pronouns: selectedPronoun
          })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('nexus_token', data.token);
          window.location.reload();
        } else {
          registerError.textContent = data.error || 'Échec de l\'inscription';
        }
      });
    });
  </script>
</body>
</html>
