<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
      --green: #10b981;
      --red: #f23f43;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    /* ── Auth Overlay ─────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 60%, #0a0a14 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: rgba(18, 18, 42, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      box-shadow: 0 0 60px rgba(124,58,237,.2), 0 24px 64px rgba(0,0,0,.6);
    }
    .auth-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 2.4rem; font-weight: 700;
      color: var(--violet-neon);
      text-shadow: 0 0 20px rgba(168,85,247,.8), 0 0 40px rgba(124,58,237,.5);
      letter-spacing: .05em;
    }
    .auth-sub { text-align: center; color: var(--text-secondary); font-size: .9rem; margin-bottom: 32px; line-height: 1.5; }

    .auth-tabs { display: flex; margin-bottom: 28px; gap: 4px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,.05); color: var(--text-secondary); font-size: .9rem; font-weight: 500; border-radius: 8px; transition: .2s; border: none; }
    .auth-tab.active { background: var(--deep-purple); color: #fff; }

    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); margin-bottom: 6px; }
    .auth-field input {
      width: 100%; padding: 12px 14px;
      background: rgba(168,85,247,.1); border: 1.5px solid rgba(124,58,237,.3);
      border-radius: 8px; color: var(--text-primary);
      font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .auth-field input:focus { border-color: var(--violet-neon); box-shadow: var(--glow); }
    .auth-field input::placeholder { color: var(--text-secondary); }

    .pronoun-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .pronoun-badge { padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: .82rem; background: rgba(124,58,237,.1); border: 1.5px solid rgba(124,58,237,.3); color: var(--text-secondary); transition: .2s; }
    .pronoun-badge.selected { background: var(--deep-purple); border-color: var(--deep-purple); color: #fff; }

    .auth-btn {
      width: 100%; padding: 13px; margin-top: 8px;
      background: var(--deep-purple); color: #fff;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: .2s;
      box-shadow: 0 0 20px rgba(124,58,237,.4);
    }
    .auth-btn:hover { background: #6d28d9; box-shadow: 0 0 30px rgba(124,58,237,.6); }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
    .auth-error { color: var(--red); font-size: .85rem; text-align: center; margin-top: 12px; min-height: 20px; }

    /* ── App ──────────────────────────────────────────────────────── */
    #app {
      display: none;
      grid-template-columns: 80px 280px 1fr 240px;
      height: 100vh;
      overflow: hidden;
    }
    #app.visible { display: grid; }

    /* MPs colonne */
    .mp-column {
      background-color: var(--darker-bg);
      border-right: 1px solid rgba(124,58,237,.2);
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0; gap: 8px;
    }
    .mp-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background-color: rgba(168,85,247,.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--violet-neon); cursor: pointer; transition: all .2s ease;
      border: none; position: relative;
    }
    .mp-icon:hover { background-color: rgba(168,85,247,.4); box-shadow: var(--glow); }
    .mp-icon.active { background-color: var(--violet-neon); color: white; box-shadow: var(--glow-active); }

    /* Hubs colonne */
    .hubs-column {
      background-color: var(--darker-bg);
      border-right: 1px solid rgba(124,58,237,.2);
      display: flex; flex-direction: column; padding: 16px 0;
    }
    .hubs-header { padding: 0 16px 16px; border-bottom: 1px solid rgba(124,58,237,.2); margin-bottom: 8px; }
    .hubs-header h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    .hubs-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .hub-item {
      height: 48px; border-radius: 8px;
      display: flex; align-items: center; padding: 0 12px;
      margin-bottom: 4px; cursor: pointer; transition: all .2s ease; position: relative;
    }
    .hub-item:hover { background-color: rgba(168,85,247,.2); }
    .hub-item.active { background-color: rgba(124,58,237,.3); }
    .hub-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background-color: var(--violet-neon); border-radius: 0 4px 4px 0; }
    .hub-icon { width: 32px; height: 32px; border-radius: 50%; background-color: var(--deep-purple); margin-right: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; font-size: .85rem; }
    .hub-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .add-hub { width: 48px; height: 48px; border-radius: 50%; background-color: rgba(168,85,247,.2); display: flex; align-items: center; justify-content: center; color: var(--violet-neon); cursor: pointer; margin: 8px auto; transition: all .2s ease; border: none; }
    .add-hub:hover { background-color: rgba(168,85,247,.4); box-shadow: var(--glow); }

    /* Espaces colonne */
    .espaces-column {
      display: flex; flex-direction: column; background-color: var(--dark-bg);
    }
    .espaces-header { padding: 16px 24px; border-bottom: 1px solid rgba(124,58,237,.2); display: flex; align-items: center; justify-content: space-between; }
    .espaces-header h1 { font-size: 16px; font-weight: 600; }
    .espaces-header .channel-type { color: var(--text-secondary); font-size: 14px; }
    .espaces-list { overflow-y: auto; padding: 16px 0; }
    .espace-category { margin-bottom: 16px; }
    .espace-category-header { padding: 0 24px; display: flex; align-items: center; cursor: pointer; color: var(--text-secondary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .espace-item { height: 40px; border-radius: 4px; display: flex; align-items: center; padding: 0 24px; margin-bottom: 2px; cursor: pointer; transition: all .2s ease; }
    .espace-item:hover { background-color: rgba(168,85,247,.1); }
    .espace-item.active { background-color: rgba(124,58,237,.2); color: var(--violet-neon); }
    .espace-icon { margin-right: 12px; color: var(--text-secondary); }
    .espace-name { font-size: 14px; font-weight: 500; }

    /* Chat zone */
    .chat-zone { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages-container { flex: 1; overflow-y: auto; padding: 24px; }
    .message { display: flex; margin-bottom: 20px; }
    .message-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 16px; flex-shrink: 0; }
    .message-content { flex: 1; }
    .message-header { display: flex; align-items: center; margin-bottom: 4px; gap: 8px; }
    .message-username { font-weight: 600; color: var(--violet-neon); }
    .message-pronouns { background-color: rgba(168,85,247,.3); color: var(--violet-neon); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .message-time { color: var(--text-secondary); font-size: 12px; }
    .message-text { line-height: 1.5; word-wrap: break-word; }
    .message-input-area { padding: 16px 24px; background-color: var(--darker-bg); border-top: 1px solid rgba(124,58,237,.2); }
    .message-input-area input { width: 100%; padding: 12px 16px; background-color: rgba(168,85,247,.1); border: 1px solid rgba(124,58,237,.3); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; transition: all .2s ease; font-family: inherit; }
    .message-input-area input:focus { border-color: var(--violet-neon); box-shadow: var(--glow); }
    .message-input-area input::placeholder { color: var(--text-secondary); }

    /* User panel */
    .user-panel { padding: 10px 12px; background: rgba(0,0,0,.3); border-top: 1px solid rgba(124,58,237,.2); display: flex; align-items: center; gap: 10px; }
    .user-panel img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--green); }
    .user-panel .info { flex: 1; min-width: 0; }
    .user-panel .info b { display: block; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .user-panel .info small { font-size: .75rem; color: var(--text-secondary); }
    .btn-logout { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 4px; transition: color .2s; font-size: 1rem; }
    .btn-logout:hover { color: var(--red); }

    /* Membres */
    .members-column { background-color: var(--darker-bg); border-left: 1px solid rgba(124,58,237,.2); display: flex; flex-direction: column; padding: 16px 0; }
    .members-header { padding: 0 16px 16px; border-bottom: 1px solid rgba(124,58,237,.2); margin-bottom: 8px; }
    .members-header h2 { font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    .members-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .member-item { height: 44px; border-radius: 4px; display: flex; align-items: center; padding: 0 12px; margin-bottom: 4px; cursor: pointer; transition: all .2s ease; gap: 10px; }
    .member-item:hover { background-color: rgba(168,85,247,.2); }
    .member-avatar-wrap { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
    .member-avatar-wrap img { width: 32px; height: 32px; border-radius: 50%; }
    .member-status { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--darker-bg); }
    .member-status.online { background-color: var(--green); }
    .member-status.offline { background-color: #6b7280; }
    .member-name { font-size: 14px; font-weight: 500; flex: 1; }
    .member-pronouns { background-color: rgba(168,85,247,.3); color: var(--violet-neon); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(124,58,237,.1); }
    ::-webkit-scrollbar-thumb { background: rgba(168,85,247,.4); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--violet-neon); }

    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--darker-bg); color: var(--text-primary); padding: 12px 20px; border-radius: 8px; border-left: 3px solid var(--violet-neon); font-size: .9rem; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">✦ NEXUS</div>
    <div class="auth-sub">Le hub inclusif où chaque voix compte.<br>Rejoins une communauté qui célèbre la diversité.</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn">Connexion</button>
      <button class="auth-tab" id="tab-register-btn">Inscription</button>
    </div>

    <div id="tab-login">
      <div class="auth-field">
        <label>Pseudo</label>
        <input type="text" id="login-user" placeholder="ton_pseudo" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="auth-btn" id="login-btn">Se connecter</button>
    </div>

    <div id="tab-register" style="display:none">
      <div class="auth-field">
        <label>Pseudo</label>
        <input type="text" id="reg-user" placeholder="ton_pseudo">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input type="password" id="reg-pass" placeholder="••••••••">
      </div>
      <div class="auth-field">
        <label>Pronoms <span style="color:var(--violet-neon)">*</span></label>
        <div class="pronoun-badges">
          <div class="pronoun-badge selected" data-value="iel">iel</div>
          <div class="pronoun-badge" data-value="il">il</div>
          <div class="pronoun-badge" data-value="elle">elle</div>
          <div class="pronoun-badge" data-value="iel/il">iel/il</div>
          <div class="pronoun-badge" data-value="iel/elle">iel/elle</div>
          <div class="pronoun-badge" data-value="Autre">Autre</div>
        </div>
      </div>
      <button class="auth-btn" id="register-btn">Créer mon compte</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">

  <!-- MPs / Nav -->
  <div class="mp-column">
    <button class="mp-icon active" id="btn-home" title="Accueil"><i class="fas fa-home"></i></button>
    <button class="mp-icon" id="btn-dms" title="Messages privés"><i class="fas fa-envelope"></i></button>
    <button class="mp-icon" id="btn-members" title="Membres"><i class="fas fa-user-friends"></i></button>
    <div style="flex:1"></div>
    <button class="mp-icon" id="btn-settings" title="Paramètres"><i class="fas fa-cog"></i></button>
  </div>

  <!-- Hubs -->
  <div class="hubs-column">
    <div class="hubs-header"><h2>Hubs</h2></div>
    <div class="hubs-list" id="hubs-list"></div>
    <button class="add-hub" id="btn-add-hub" title="Créer un Hub"><i class="fas fa-plus"></i></button>
    <div class="user-panel">
      <img id="my-avatar" src="" alt="">
      <div class="info">
        <b id="my-name">...</b>
        <small id="my-pronouns"></small>
      </div>
      <button class="btn-logout" id="btn-logout" title="Déconnexion"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <!-- Espaces + Chat -->
  <div class="espaces-column">
    <div class="espaces-header">
      <h1 id="current-channel-name"># général</h1>
      <span class="channel-type">Espace texte</span>
    </div>
    <div class="espaces-list" id="espaces-list"></div>
    <div class="chat-zone">
      <div class="messages-container" id="messages-container"></div>
      <div class="message-input-area">
        <input type="text" id="message-input" placeholder="Envoyer un message...">
      </div>
    </div>
  </div>

  <!-- Membres -->
  <div class="members-column">
    <div class="members-header"><h2 id="members-count">Membres</h2></div>
    <div class="members-list" id="members-list"></div>
  </div>

</div>

<div id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const socket = io();
  let currentUser    = null;
  let currentChannel = null;
  let lastMsgUser    = null;
  let selectedPronoun = 'iel';
  let onlineUsers    = new Map();

  // ── Pronoun badges ──────────────────────────────────────────────
  document.querySelectorAll('.pronoun-badge').forEach(function(badge) {
    badge.addEventListener('click', function() {
      document.querySelectorAll('.pronoun-badge').forEach(function(b) { b.classList.remove('selected'); });
      badge.classList.add('selected');
      selectedPronoun = badge.dataset.value;
    });
  });

  // ── Auth tabs ───────────────────────────────────────────────────
  document.getElementById('tab-login-btn').addEventListener('click', function() {
    document.getElementById('tab-login-btn').classList.add('active');
    document.getElementById('tab-register-btn').classList.remove('active');
    document.getElementById('tab-login').style.display = '';
    document.getElementById('tab-register').style.display = 'none';
    document.getElementById('auth-error').textContent = '';
  });

  document.getElementById('tab-register-btn').addEventListener('click', function() {
    document.getElementById('tab-register-btn').classList.add('active');
    document.getElementById('tab-login-btn').classList.remove('active');
    document.getElementById('tab-register').style.display = '';
    document.getElementById('tab-login').style.display = 'none';
    document.getElementById('auth-error').textContent = '';
  });

  // ── Login ───────────────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', async function() {
    var username = document.getElementById('login-user').value.trim();
    var password = document.getElementById('login-pass').value;
    if (!username || !password) { showError('Remplis tous les champs'); return; }
    document.getElementById('login-btn').disabled = true;
    document.getElementById('login-btn').textContent = 'Connexion...';
    try {
      var res  = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      var data = await res.json();
      if (!res.ok) { showError(data.error || 'Erreur'); return; }
      localStorage.setItem('nexus_token', data.token);
      startApp(data.user);
    } catch(e) { showError('Impossible de joindre le serveur'); }
    finally {
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').textContent = 'Se connecter';
    }
  });

  // ── Register ────────────────────────────────────────────────────
  document.getElementById('register-btn').addEventListener('click', async function() {
    var username = document.getElementById('reg-user').value.trim();
    var password = document.getElementById('reg-pass').value;
    if (!username || !password) { showError('Remplis tous les champs'); return; }
    document.getElementById('register-btn').disabled = true;
    document.getElementById('register-btn').textContent = 'Création...';
    try {
      var res  = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, pronouns: selectedPronoun }) });
      var data = await res.json();
      if (!res.ok) { showError(data.error || 'Erreur'); return; }
      localStorage.setItem('nexus_token', data.token);
      startApp(data.user);
    } catch(e) { showError('Impossible de joindre le serveur'); }
    finally {
      document.getElementById('register-btn').disabled = false;
      document.getElementById('register-btn').textContent = "Créer mon compte";
    }
  });

  function showError(msg) { document.getElementById('auth-error').textContent = msg; }

  // ── Start App ───────────────────────────────────────────────────
  function startApp(user) {
    currentUser = user;
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    document.getElementById('my-name').textContent     = user.username;
    document.getElementById('my-pronouns').textContent = user.pronouns;
    document.getElementById('my-avatar').src           = user.avatar;
    socket.emit('auth', { token: localStorage.getItem('nexus_token') });
    loadServers();
  }

  async function loadServers() {
    try {
      var res     = await fetch('/api/servers');
      var servers = await res.json();
      if (!servers.length) return;
      renderHubs(servers);
      var srv = servers[0];
      renderEspaces(srv.channels);
      var firstText = srv.channels.find(function(c) { return c.type === 'text'; });
      if (firstText) joinChannel(firstText);
    } catch(e) { console.error('Erreur chargement serveurs:', e); }
  }

  function renderHubs(servers) {
    var list = document.getElementById('hubs-list');
    list.innerHTML = '';
    servers.forEach(function(srv, i) {
      var el = document.createElement('div');
      el.className = 'hub-item' + (i === 0 ? ' active' : '');
      el.innerHTML = '<div class="hub-icon">' + srv.name[0] + '</div><div class="hub-name">' + srv.name + '</div>';
      list.appendChild(el);
    });
  }

  function renderEspaces(channels) {
    var list   = document.getElementById('espaces-list');
    var texts  = channels.filter(function(c) { return c.type === 'text'; });
    var voices = channels.filter(function(c) { return c.type === 'voice'; });
    list.innerHTML = '';

    if (texts.length) {
      var cat = document.createElement('div');
      cat.className = 'espace-category';
      cat.innerHTML = '<div class="espace-category-header"><i class="fas fa-chevron-down" style="margin-right:8px"></i>Espaces texte</div>';
      texts.forEach(function(ch) {
        var el = document.createElement('div');
        el.className = 'espace-item';
        el.id = 'ch-' + ch.id;
        el.innerHTML = '<i class="fas fa-hashtag espace-icon"></i><span class="espace-name">' + ch.name + '</span>';
        el.addEventListener('click', function() { joinChannel(ch); });
        cat.appendChild(el);
      });
      list.appendChild(cat);
    }

    if (voices.length) {
      var cat2 = document.createElement('div');
      cat2.className = 'espace-category';
      cat2.innerHTML = '<div class="espace-category-header"><i class="fas fa-chevron-down" style="margin-right:8px"></i>Espaces vocaux</div>';
      voices.forEach(function(ch) {
        var el = document.createElement('div');
        el.className = 'espace-item';
        el.innerHTML = '<i class="fas fa-volume-up espace-icon"></i><span class="espace-name">' + ch.name + '</span>';
        el.addEventListener('click', function() { toast('Audio/Vidéo bientôt disponible !'); });
        cat2.appendChild(el);
      });
      list.appendChild(cat2);
    }
  }

  function joinChannel(ch) {
    currentChannel = ch; lastMsgUser = null;
    document.getElementById('current-channel-name').textContent = '# ' + ch.name;
    document.querySelectorAll('.espace-item').forEach(function(el) { el.classList.remove('active'); });
    var el = document.getElementById('ch-' + ch.id);
    if (el) el.classList.add('active');
    document.getElementById('messages-container').innerHTML = '';
    socket.emit('join-channel', { channelId: ch.id });
  }

  // ── Socket events ───────────────────────────────────────────────
  socket.on('auth-success', function(u) { console.log('✅ Auth', u.username); });
  socket.on('auth-error',   function(e) { console.error('Auth error:', e); });

  socket.on('channel-history', function(data) {
    document.getElementById('messages-container').innerHTML = '';
    lastMsgUser = null;
    data.messages.forEach(renderMsg);
    scrollToBottom();
  });

  socket.on('new-msg', function(msg) { renderMsg(msg); scrollToBottom(); });

  socket.on('user-status', function(data) {
    if (data.status === 'online') {
      onlineUsers.set(data.userId, data);
    } else {
      onlineUsers.delete(data.userId);
    }
    renderMembers();
    toast(data.username + (data.status === 'online' ? ' est en ligne 🟢' : ' est hors ligne'));
  });

  function renderMembers() {
    var list = document.getElementById('members-list');
    list.innerHTML = '';
    document.getElementById('members-count').textContent = 'Membres — ' + onlineUsers.size;
    onlineUsers.forEach(function(u) {
      var el = document.createElement('div');
      el.className = 'member-item';
      el.innerHTML =
        '<div class="member-avatar-wrap">' +
          '<img src="https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(u.username) + '" alt="">' +
          '<div class="member-status online"></div>' +
        '</div>' +
        '<span class="member-name">' + escHtml(u.username) + '</span>';
      list.appendChild(el);
    });
  }

  function renderMsg(msg) {
    var area = document.getElementById('messages-container');
    var time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    var div  = document.createElement('div');
    div.className = 'message';
    div.innerHTML =
      '<img src="' + msg.avatar + '" alt="" class="message-avatar">' +
      '<div class="message-content">' +
        '<div class="message-header">' +
          '<span class="message-username">' + escHtml(msg.username) + '</span>' +
          '<span class="message-pronouns">' + escHtml(msg.pronouns) + '</span>' +
          '<span class="message-time">' + time + '</span>' +
        '</div>' +
        '<div class="message-text">' + escHtml(msg.content) + '</div>' +
      '</div>';
    area.appendChild(div);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    var a = document.getElementById('messages-container');
    a.scrollTop = a.scrollHeight;
  }

  // ── Input ───────────────────────────────────────────────────────
  document.getElementById('message-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      var text = e.target.value.trim();
      if (!text || !currentChannel) return;
      socket.emit('send-msg', { channelId: currentChannel.id, content: text });
      e.target.value = '';
    }
  });

  // ── Boutons nav ─────────────────────────────────────────────────
  document.getElementById('btn-add-hub').addEventListener('click', function() { toast('Création de Hub bientôt disponible !'); });
  document.getElementById('btn-settings').addEventListener('click', function() { toast('Paramètres bientôt disponibles !'); });
  document.getElementById('btn-dms').addEventListener('click', function() { toast('Messages privés bientôt disponibles !'); });
  document.getElementById('btn-members').addEventListener('click', function() {
    var col = document.querySelector('.members-column');
    col.style.display = col.style.display === 'none' ? '' : 'none';
  });

  // ── Logout ──────────────────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', function() {
    localStorage.removeItem('nexus_token');
    location.reload();
  });

  // ── Toast ───────────────────────────────────────────────────────
  window.toast = function(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  };

  // ── Auto-login ──────────────────────────────────────────────────
  var token = localStorage.getItem('nexus_token');
  if (token) {
    try {
      var payload = JSON.parse(atob(token.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        socket.emit('auth', { token: token });
        socket.once('auth-success', function(user) { startApp(user); });
        socket.once('auth-error',   function() { localStorage.removeItem('nexus_token'); });
      } else {
        localStorage.removeItem('nexus_token');
      }
    } catch(e) { localStorage.removeItem('nexus_token'); }
  }
});
</script>
</body>
</html>
