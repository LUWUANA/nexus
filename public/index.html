<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
      --green: #10b981;
      --red: #f23f43;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    /* ── Auth Overlay ─────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 60%, #0a0a14 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: rgba(18, 18, 42, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      box-shadow: 0 0 60px rgba(124,58,237,.2), 0 24px 64px rgba(0,0,0,.6);
    }
    .auth-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 2.4rem; font-weight: 700;
      color: var(--violet-neon);
      text-shadow: 0 0 20px rgba(168,85,247,.8), 0 0 40px rgba(124,58,237,.5);
      letter-spacing: .05em;
    }
    .auth-sub { text-align: center; color: var(--text-secondary); font-size: .9rem; margin-bottom: 32px; line-height: 1.5; }

    .auth-tabs { display: flex; margin-bottom: 28px; gap: 4px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,.05); color: var(--text-secondary); font-size: .9rem; font-weight: 500; border-radius: 8px; transition: .2s; border: none; }
    .auth-tab.active { background: var(--deep-purple); color: #fff; }

    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); margin-bottom: 6px; }
    .auth-field input {
      width: 100%; padding: 12px 14px;
      background: rgba(168,85,247,.1); border: 1.5px solid rgba(124,58,237,.3);
      border-radius: 8px; color: var(--text-primary);
      font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .auth-field input:focus { border-color: var(--violet-neon); box-shadow: var(--glow); }
    .auth-field input::placeholder { color: var(--text-secondary); }

    .pronoun-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .pronoun-badge {
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(168,85,247,.15);
      color: var(--text-primary);
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s;
      border: 1px solid transparent;
    }
    .pronoun-badge.selected {
      background: var(--violet-neon);
      border-color: var(--deep-purple);
      box-shadow: var(--glow);
    }
    .auth-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, var(--deep-purple), var(--violet-neon));
      color: #fff; font-size: 1.05rem; font-weight: 600;
      border: none; border-radius: 8px;
      cursor: pointer; transition: .2s;
      box-shadow: var(--glow);
    }
    .auth-submit:hover {
      box-shadow: var(--glow-active);
      transform: translateY(-1px);
    }
    .auth-error {
      color: var(--red); font-size: .85rem; text-align: center; margin-top: 16px;
    }

    /* ── Main App Layout ──────────────────────────────────────────── */
    html, body, #app { height: 100%; overflow: hidden; }
    body { background: var(--dark-bg); color: var(--text-primary); }

    #app { display: flex; }
    #app.hidden { display: none; }

    .sidebar-left {
      width: 240px; display: flex; flex-direction: column;
      background: var(--darker-bg);
      border-right: 1px solid rgba(255,255,255,.05);
    }

    .server-list {
      width: 72px; background: #0a0a14; padding: 12px 0;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; overflow-y: auto; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,.05);
    }
    .server-item {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(124,58,237,.3); color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1.1rem; cursor: pointer;
      transition: border-radius .2s, background .2s;
      position: relative;
    }
    .server-item:hover { border-radius: 30%; background: var(--violet-neon); }
    .server-item.active { border-radius: 30%; background: var(--deep-purple); }
    .server-item.home { background: var(--deep-purple); }
    .server-item.add { background: var(--green); font-size: 1.5rem; }
    .server-item.dm { background: var(--pink-neon); }

    .channel-list {
      flex-grow: 1; display: flex; flex-direction: column;
      background: var(--darker-bg);
    }
    .channel-header {
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 600; font-size: 1.1rem; cursor: pointer;
    }
    .channel-header span { display: flex; align-items: center; gap: 8px; }
    .channel-header .channel-header-icon { font-size: .8rem; color: var(--text-secondary); }

    .channel-sections { flex-grow: 1; overflow-y: auto; padding: 8px 0; }
    .channel-section-title {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px; font-size: .8rem; font-weight: 600;
      color: var(--text-secondary); text-transform: uppercase;
      cursor: pointer;
    }
    .channel-section-title i { font-size: .7rem; }
    .channel-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; margin: 0 8px; border-radius: 6px;
      cursor: pointer; transition: background .2s;
    }
    .channel-item:hover { background: rgba(255,255,255,.08); }
    .channel-item.active { background: var(--deep-purple); }
    .channel-item i { color: var(--text-secondary); font-size: .9rem; }
    .channel-item span { font-size: .95rem; }

    .user-panel {
      padding: 12px 16px; background: #0a0a14;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; gap: 12px;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--violet-neon); flex-shrink: 0;
    }
    .user-info { flex-grow: 1; }
    .user-info strong { display: block; font-size: .9rem; }
    .user-info span { font-size: .75rem; color: var(--text-secondary); }
    .user-actions button {
      background: none; border: none; color: var(--text-secondary);
      font-size: 1.1rem; cursor: pointer; margin-left: 8px;
      transition: color .2s;
    }
    .user-actions button:hover { color: var(--text-primary); }

    .main-content {
      flex-grow: 1; display: flex; flex-direction: column;
      background: var(--dark-bg);
    }
    .chat-header {
      padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem; font-weight: 600;
    }
    .chat-header i { color: var(--text-secondary); }

    .message-list {
      flex-grow: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .message-item { display: flex; gap: 12px; }
    .message-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--pink-neon); flex-shrink: 0;
    }
    .message-content { flex-grow: 1; }
    .message-author { font-weight: 600; margin-bottom: 4px; }
    .message-author span { font-size: .8rem; color: var(--text-secondary); margin-left: 8px; }
    .message-text { font-size: .95rem; line-height: 1.4; }

    .message-input-area {
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.05);
      background: var(--darker-bg);
    }
    .message-input {
      width: 100%; padding: 12px 16px;
      background: rgba(168,85,247,.1); border: 1.5px solid rgba(124,58,237,.3);
      border-radius: 8px; color: var(--text-primary);
      font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .message-input:focus { border-color: var(--violet-neon); box-shadow: var(--glow); }
    .message-input::placeholder { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">NEXUS</div>
      <p class="auth-sub">Connectez-vous ou créez un compte pour rejoindre la conversation.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="login-tab">Connexion</button>
        <button class="auth-tab" id="register-tab">Inscription</button>
      </div>

      <form id="login-form" class="auth-form">
        <div class="auth-field">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Votre pseudo" required>
        </div>
        <div class="auth-field">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="auth-submit">Se connecter</button>
        <p class="auth-error" id="login-error"></p>
      </form>

      <form id="register-form" class="auth-form hidden">
        <div class="auth-field">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" required>
        </div>
        <div class="auth-field">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" required>
        </div>
        <div class="auth-field">
          <label>Pronoms (optionnel)</label>
          <div class="pronoun-badges" id="pronoun-badges">
            <span class="pronoun-badge" data-pronouns="iel">iel</span>
            <span class="pronoun-badge" data-pronouns="il">il</span>
            <span class="pronoun-badge" data-pronouns="elle">elle</span>
            <span class="pronoun-badge" data-pronouns="iel/elle">iel/elle</span>
            <span class="pronoun-badge" data-pronouns="il/iel">il/iel</span>
          </div>
          <input type="hidden" id="register-pronouns" value="iel">
        </div>
        <button type="submit" class="auth-submit">S'inscrire</button>
        <p class="auth-error" id="register-error"></p>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="server-list">
      <div class="server-item home active" data-server-id="home">🏠</div>
      <div class="server-item dm" data-server-id="dm">💬</div>
      <div class="server-item" data-server-id="1">NEXUS</div>
      <div class="server-item add">+</div>
    </div>

    <div class="channel-list">
      <div class="channel-header">
        <span id="current-server-name">NEXUS Core</span>
        <span id="server-dropdown-icon" class="channel-header-icon">▾</span>
      </div>
      <div class="channel-sections">
        <div class="channel-section-title">
          TEXTUEL
        </div>
        <div class="channel-item active" data-channel-id="1">
          # <span>général</span>
        </div>
        <div class="channel-item" data-channel-id="2">
          # <span>annonces</span>
        </div>
        <div class="channel-section-title">
          VOCAL
        </div>
        <div class="channel-item" data-channel-id="3">
          🔊 <span>Salon vocal 1</span>
        </div>
      </div>
      <div class="user-panel">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=user" alt="Avatar" class="user-avatar" id="user-avatar">
        <div class="user-info">
          <strong id="user-username">Utilisateur</strong>
          <span id="user-pronouns">iel</span>
        </div>
        <div class="user-actions">
          <button id="settings-btn">⚙️</button>
          <button id="logout-btn">⏏️</button>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="chat-header">
        # <span id="current-channel-name">général</span>
      </div>
      <div class="message-list" id="message-list">
        <!-- Messages will be appended here -->
      </div>
      <div class="message-input-area">
        <input type="text" id="message-input" class="message-input" placeholder="Envoyer un message...">
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const socket = io();
      let currentUser = null;
      let currentServerId = 'home';
      let currentChannelId = null;

      // --- DOM Elements ---
      const authOverlay = document.getElementById('auth-overlay');
      const appContainer = document.getElementById('app');
      const loginTab = document.getElementById('login-tab');
      const registerTab = document.getElementById('register-tab');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginError = document.getElementById('login-error');
      const registerError = document.getElementById('register-error');
      const pronounBadges = document.getElementById('pronoun-badges');
      const registerPronounsInput = document.getElementById('register-pronouns');

      const serverList = document.querySelector('.server-list');
      const channelListContainer = document.querySelector('.channel-sections');
      const currentServerName = document.getElementById('current-server-name');
      const currentChannelName = document.getElementById('current-channel-name');
      const messageList = document.getElementById('message-list');
      const messageInput = document.getElementById('message-input');
      const userAvatar = document.getElementById('user-avatar');
      const userUsername = document.getElementById('user-username');
      const userPronouns = document.getElementById('user-pronouns');
      const logoutBtn = document.getElementById('logout-btn');

      // --- Auth Logic ---
      loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        loginError.textContent = '';
        registerError.textContent = '';
      });

      registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        loginError.textContent = '';
        registerError.textContent = '';
      });

      pronounBadges.addEventListener('click', (e) => {
        if (e.target.classList.contains('pronoun-badge')) {
          document.querySelectorAll('.pronoun-badge').forEach(badge => badge.classList.remove('selected'));
          e.target.classList.add('selected');
          registerPronounsInput.value = e.target.dataset.pronouns;
        }
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = e.target['login-username'].value;
        const password = e.target['login-password'].value;

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('token', data.token);
            currentUser = data.user;
            socket.auth = { token: data.token };
            socket.connect();
            authOverlay.classList.add('hidden');
            appContainer.classList.remove('hidden');
            updateUserInfo();
            joinServer('home'); // Default to home/DMs
          } else {
            loginError.textContent = data.error || 'Erreur de connexion';
          }
        } catch (error) {
          loginError.textContent = 'Erreur réseau';
        }
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = e.target['register-username'].value;
        const password = e.target['register-password'].value;
        const pronouns = e.target['register-pronouns'].value;

        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, pronouns })
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('token', data.token);
            currentUser = data.user;
            socket.auth = { token: data.token };
            socket.connect();
            authOverlay.classList.add('hidden');
            appContainer.classList.remove('hidden');
            updateUserInfo();
            joinServer('home'); // Default to home/DMs
          } else {
            registerError.textContent = data.error || 'Erreur d\'inscription';
          }
        } catch (error) {
          registerError.textContent = 'Erreur réseau';
        }
      });

      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        currentUser = null;
        socket.disconnect();
        authOverlay.classList.remove('hidden');
        appContainer.classList.add('hidden');
        messageList.innerHTML = ''; // Clear messages
        channelListContainer.innerHTML = ''; // Clear channels
        serverList.querySelectorAll('.server-item:not(.home):not(.dm):not(.add)').forEach(el => el.remove()); // Clear dynamic servers
      });

      // --- Socket.io Logic ---
      socket.on('connect', () => {
        console.log('Connected to Socket.io');
        if (currentUser) {
          socket.emit('user-online', currentUser.id);
          fetchServers();
        }
      });

      socket.on('disconnect', () => {
        console.log('Disconnected from Socket.io');
        if (currentUser) {
          socket.emit('user-offline', currentUser.id);
        }
      });

      socket.on('auth-error', (message) => {
        console.error('Socket.io Auth Error:', message);
        localStorage.removeItem('token');
        currentUser = null;
        socket.disconnect();
        authOverlay.classList.remove('hidden');
        appContainer.classList.add('hidden');
        loginError.textContent = 'Session expirée. Veuillez vous reconnecter.';
        loginTab.click();
      });

      socket.on('servers-list', (servers) => {
        renderServers(servers);
      });

      socket.on('channels-list', (channels) => {
        renderChannels(channels);
      });

      socket.on('channel-history', (messages) => {
        renderMessages(messages);
      });

      socket.on('new-message', (message) => {
        if (message.channel_id === currentChannelId) {
          addMessageToChat(message);
        }
      });

      // --- UI Update Functions ---
      function updateUserInfo() {
        if (currentUser) {
          userAvatar.src = currentUser.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(currentUser.username)}`;
          userUsername.textContent = currentUser.username;
          userPronouns.textContent = currentUser.pronouns;
        }
      }

      function fetchServers() {
        socket.emit('get-servers');
      }

      function renderServers(servers) {
        // Clear existing dynamic servers
        serverList.querySelectorAll('.server-item:not(.home):not(.dm):not(.add)').forEach(el => el.remove());

        servers.forEach(server => {
          const serverItem = document.createElement('div');
          serverItem.classList.add('server-item');
          serverItem.dataset.serverId = server.id;
          serverItem.textContent = server.name.charAt(0).toUpperCase();
          serverItem.addEventListener('click', () => joinServer(server.id));
          serverList.insertBefore(serverItem, serverList.querySelector('.server-item.add'));
        });

        // Re-select current server if it exists
        if (currentServerId) {
          serverList.querySelector(`.server-item[data-server-id="${currentServerId}"]`)?.classList.add('active');
        }
      }

      function joinServer(serverId) {
        if (currentServerId) {
          serverList.querySelector(`.server-item[data-server-id="${currentServerId}"]`)?.classList.remove('active');
        }
        currentServerId = serverId;
        serverList.querySelector(`.server-item[data-server-id="${serverId}"]`)?.classList.add('active');

        if (serverId === 'home') {
          currentServerName.textContent = 'Messages Privés';
          channelListContainer.innerHTML = `
            <div class="channel-section-title">
              AMIS
            </div>
            <div class="channel-item active" data-channel-id="dm-general">
              👥 <span>Général</span>
            </div>
          `;
          currentChannelId = 'dm-general'; // Placeholder for DM general
          currentChannelName.textContent = 'Général';
          messageList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">Bienvenue dans vos messages privés !</div>';
          // In a real app, this would fetch DM list and history
        } else if (serverId === 'dm') {
          currentServerName.textContent = 'Messages Privés';
          channelListContainer.innerHTML = `
            <div class="channel-section-title">
              AMIS
            </div>
            <div class="channel-item active" data-channel-id="dm-general">
              👥 <span>Général</span>
            </div>
          `;
          currentChannelId = 'dm-general'; // Placeholder for DM general
          currentChannelName.textContent = 'Général';
          messageList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">Bienvenue dans vos messages privés !</div>';
          // In a real app, this would fetch DM list and history
        } else {
          socket.emit('join-server', serverId, (serverName) => {
            currentServerName.textContent = serverName;
            // Fetch channels for this server
            socket.emit('get-channels', serverId);
          });
        }
      }

      function renderChannels(channels) {
        channelListContainer.innerHTML = ''; // Clear existing channels

        const textChannels = channels.filter(c => c.type === 'text');
        const voiceChannels = channels.filter(c => c.type === 'voice');

        if (textChannels.length > 0) {
          const textSectionTitle = document.createElement('div');
          textSectionTitle.classList.add('channel-section-title');
          textSectionTitle.innerHTML = `TEXTUEL`;
          channelListContainer.appendChild(textSectionTitle);

          textChannels.forEach(channel => {
            const channelItem = document.createElement('div');
            channelItem.classList.add('channel-item');
            channelItem.dataset.channelId = channel.id;
            channelItem.innerHTML = `# <span>${channel.name}</span>`;
            channelItem.addEventListener('click', () => joinChannel(channel.id, channel.name));
            channelListContainer.appendChild(channelItem);
          });
        }

        if (voiceChannels.length > 0) {
          const voiceSectionTitle = document.createElement('div');
          voiceSectionTitle.classList.add('channel-section-title');
          voiceSectionTitle.innerHTML = `VOCAL`;
          channelListContainer.appendChild(voiceSectionTitle);

          voiceChannels.forEach(channel => {
            const channelItem = document.createElement('div');
            channelItem.classList.add('channel-item');
            channelItem.dataset.channelId = channel.id;
            channelItem.innerHTML = `🔊 <span>${channel.name}</span>`;
            channelItem.addEventListener('click', () => joinChannel(channel.id, channel.name));
            channelListContainer.appendChild(channelItem);
          });
        }

        // Auto-join first text channel if available
        if (textChannels.length > 0 && !currentChannelId) {
          joinChannel(textChannels[0].id, textChannels[0].name);
        } else if (currentChannelId) {
          // Re-select current channel if it exists
          channelListContainer.querySelector(`.channel-item[data-channel-id="${currentChannelId}"]`)?.classList.add('active');
        }
      }

      function joinChannel(channelId, channelName) {
        if (currentChannelId) {
          channelListContainer.querySelector(`.channel-item[data-channel-id="${currentChannelId}"]`)?.classList.remove('active');
        }
        currentChannelId = channelId;
        channelListContainer.querySelector(`.channel-item[data-channel-id="${channelId}"]`)?.classList.add('active');
        currentChannelName.textContent = channelName;
        messageList.innerHTML = ''; // Clear messages
        socket.emit('join-channel', channelId);
      }

      function renderMessages(messages) {
        messageList.innerHTML = ''; // Clear existing messages
        messages.forEach(addMessageToChat);
        messageList.scrollTop = messageList.scrollHeight; // Scroll to bottom
      }

      function addMessageToChat(message) {
        const messageItem = document.createElement('div');
        messageItem.classList.add('message-item');
        messageItem.innerHTML = `
          <img src="${message.user_avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(message.username)}`}" alt="Avatar" class="message-avatar">
          <div class="message-content">
            <div class="message-author">
              ${message.username} <span>${new Date(message.created_at).toLocaleTimeString()}</span>
            </div>
            <div class="message-text">${message.content}</div>
          </div>
        `;
        messageList.appendChild(messageItem);
        messageList.scrollTop = messageList.scrollHeight; // Scroll to bottom
      }

      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && messageInput.value.trim() !== '' && currentChannelId) {
          socket.emit('send-message', {
            channel_id: currentChannelId,
            content: messageInput.value.trim()
          });
          messageInput.value = '';
        }
      });

      // --- Initial Load ---
      const token = localStorage.getItem('token');
      if (token) {
        socket.auth = { token };
        socket.connect();
        // Request user info after connection
        socket.emit('get-user-info', (user) => {
          if (user) {
            currentUser = user;
            authOverlay.classList.add('hidden');
            appContainer.classList.remove('hidden');
            updateUserInfo();
            joinServer('home'); // Default to home/DMs
          } else {
            // Token invalid or expired
            localStorage.removeItem('token');
            authOverlay.classList.remove('hidden');
            appContainer.classList.add('hidden');
            loginError.textContent = 'Session expirée. Veuillez vous reconnecter.';
            loginTab.click();
          }
        });
      } else {
        authOverlay.classList.remove('hidden');
        appContainer.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
