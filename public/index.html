<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --violet:    #6e57ff;
      --violet-2:  #5a46e8;
      --neon:      #a78bfa;
      --bg:        #1e1f22;
      --bg-side:   #2b2d31;
      --bg-chat:   #313338;
      --bg-input:  #383a40;
      --bg-dark:   #111214;
      --text:      #dbdee1;
      --text-muted:#949ba4;
      --green:     #23a55a;
      --red:       #f23f43;
      --radius:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Auth ───────────────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }

    .auth-card {
      background: var(--bg-side);
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .auth-card h1 { font-size: 1.8rem; font-weight: 700; color: var(--neon); text-align: center; margin-bottom: 4px; }
    .auth-card p  { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: .9rem; }

    .auth-tabs { display: flex; margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; }
    .auth-tab  { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: var(--bg-input); color: var(--text-muted); font-size: .9rem; font-weight: 500; transition: .2s; }
    .auth-tab.active { background: var(--violet); color: #fff; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 12px 14px;
      background: var(--bg-input); border: 1.5px solid transparent;
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: .95rem;
      transition: border-color .2s; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--violet); }
    .field select option { background: var(--bg-input); }

    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--violet); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn-primary:hover { background: var(--violet-2); }

    #auth-error { color: var(--red); font-size: .85rem; text-align: center; margin-top: 12px; min-height: 20px; }

    /* ── App ────────────────────────────────────────────────────── */
    #app { display: none; grid-template-columns: 72px 240px 1fr; height: 100vh; }
    #app.visible { display: grid; }

    .servers {
      background: var(--bg-dark);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; gap: 8px; overflow-y: auto;
    }
    .srv-item { position: relative; display: flex; align-items: center; }
    .srv-pill { width: 4px; height: 0; background: var(--text); border-radius: 0 4px 4px 0; position: absolute; left: 0; transition: height .2s; }
    .srv-item.active .srv-pill { height: 40px; }
    .srv-icon {
      width: 48px; height: 48px; background: var(--bg-side); border-radius: 50%;
      cursor: pointer; transition: border-radius .2s, background .2s;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem; user-select: none;
    }
    .srv-icon:hover, .srv-item.active .srv-icon { border-radius: 30%; background: var(--violet); }
    .srv-sep { width: 32px; height: 2px; background: var(--bg-side); border-radius: 1px; }

    .sidebar { background: var(--bg-side); display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; font-weight: 700; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,.06); }
    .channels-list { flex: 1; padding: 8px; overflow-y: auto; }
    .ch-category { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); padding: 16px 8px 4px; }
    .ch-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 6px; cursor: pointer;
      color: var(--text-muted); font-size: .95rem;
      transition: background .15s, color .15s;
    }
    .ch-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .ch-item.active { background: rgba(255,255,255,.1); color: var(--text); }

    .user-panel { background: var(--bg-dark); padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .user-panel .avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--green); }
    .user-panel .info { flex: 1; min-width: 0; }
    .user-panel .info b { display: block; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-panel .info small { font-size: .75rem; color: var(--text-muted); }
    .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 1rem; transition: color .2s; }
    .btn-icon:hover { color: var(--text); }

    .chat { display: flex; flex-direction: column; background: var(--bg-chat); }
    .chat-header { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: 10px; font-weight: 600; }

    #chat-area { flex: 1; padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }

    .msg-group { display: flex; gap: 16px; margin-top: 16px; }
    .msg-group .ava { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .msg-group .meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .msg-group .meta b { color: var(--violet); font-size: .95rem; }
    .msg-group .meta .pronouns { font-size: .72rem; color: var(--text-muted); background: rgba(110,87,255,.15); padding: 1px 6px; border-radius: 10px; }
    .msg-group .meta time { font-size: .75rem; color: var(--text-muted); }
    .msg-group p { line-height: 1.4; word-break: break-word; }
    .msg-continued { padding: 1px 0 1px 56px; }
    .msg-continued:hover, .msg-group:hover { background: rgba(0,0,0,.1); border-radius: 4px; }

    .input-bar { padding: 0 20px 24px; }
    .input-wrap { display: flex; align-items: center; background: var(--bg-input); border-radius: var(--radius); padding: 0 16px; }
    .input-wrap input { flex: 1; background: none; border: none; padding: 14px 0; color: var(--text); font-family: inherit; font-size: .95rem; outline: none; }
    .input-wrap input::placeholder { color: var(--text-muted); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-side); color: var(--text); padding: 12px 20px; border-radius: var(--radius); border-left: 3px solid var(--violet); font-size: .9rem; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>✦ NEXUS</h1>
    <p>Rejoins la communauté inclusive</p>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Connexion</div>
      <div class="auth-tab" onclick="switchTab('register')">Inscription</div>
    </div>

    <div id="tab-login">
      <div class="field"><label>Pseudo</label><input type="text" id="login-user" placeholder="ton_pseudo" autocomplete="username"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    </div>

    <div id="tab-register" style="display:none">
      <div class="field"><label>Pseudo</label><input type="text" id="reg-user" placeholder="ton_pseudo"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-pass" placeholder="••••••••"></div>
      <div class="field">
        <label>Pronoms <span style="color:var(--violet)">*</span></label>
        <select id="reg-pronouns">
          <option value="iel">iel (Inclusif)</option>
          <option value="il">il</option>
          <option value="elle">elle</option>
          <option value="iel/il">iel/il</option>
          <option value="iel/elle">iel/elle</option>
          <option value="Autre">Autre / Demander</option>
        </select>
      </div>
      <button class="btn-primary" onclick="doRegister()">Créer mon compte</button>
    </div>

    <div id="auth-error"></div>
  </div>
</div>

<div id="app">
  <div class="servers" id="servers-list">
    <div class="srv-item active">
      <div class="srv-pill"></div>
      <div class="srv-icon" title="Nexus Core">N</div>
    </div>
    <div class="srv-sep"></div>
    <div class="srv-item">
      <div class="srv-icon" title="Créer un serveur" onclick="toast('Bientôt disponible !')">+</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Nexus Core</div>
    <div class="channels-list" id="channels-list"></div>
    <div class="user-panel">
      <img id="my-avatar" class="avatar" src="" alt="">
      <div class="info">
        <b id="my-name">...</b>
        <small id="my-pronouns"></small>
      </div>
      <button class="btn-icon" onclick="doLogout()" title="Se déconnecter">⏏</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-header">
      <span>#</span>
      <span id="active-channel-name">général</span>
    </div>
    <div id="chat-area"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="chat-input" placeholder="Envoyer un message..." onkeydown="handleKey(event)">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="snd-in" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<script>
let currentUser = null, currentChannel = null, lastMsgUser = null;
const socket = io();

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i===0)===(tab==='login')));
  document.getElementById('tab-login').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab==='register' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  await authRequest('/api/login', {
    username: document.getElementById('login-user').value.trim(),
    password: document.getElementById('login-pass').value
  });
}

async function doRegister() {
  await authRequest('/api/register', {
    username: document.getElementById('reg-user').value.trim(),
    password: document.getElementById('reg-pass').value,
    pronouns: document.getElementById('reg-pronouns').value
  });
}

async function authRequest(url, body) {
  document.getElementById('auth-error').textContent = '';
  try {
    const res  = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) return document.getElementById('auth-error').textContent = data.error || 'Erreur inconnue';
    localStorage.setItem('nexus_token', data.token);
    startApp(data.user);
  } catch { document.getElementById('auth-error').textContent = 'Impossible de joindre le serveur'; }
}

function doLogout() { localStorage.removeItem('nexus_token'); location.reload(); }

async function startApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('my-name').textContent     = user.username;
  document.getElementById('my-pronouns').textContent = user.pronouns;
  document.getElementById('my-avatar').src           = user.avatar;
  document.getElementById('snd-in').play().catch(()=>{});
  socket.emit('auth', { token: localStorage.getItem('nexus_token') });
  await loadServers();
}

async function loadServers() {
  const res     = await fetch('/api/servers');
  const servers = await res.json();
  if (!servers.length) return;
  const srv = servers[0];
  renderChannels(srv.channels);
  const firstText = srv.channels.find(c => c.type === 'text');
  if (firstText) joinChannel(firstText);
}

function renderChannels(channels) {
  const list   = document.getElementById('channels-list');
  const texts  = channels.filter(c => c.type === 'text');
  const voices = channels.filter(c => c.type === 'voice');
  list.innerHTML = '';
  if (texts.length)  list.innerHTML += `<div class="ch-category">Salons texte</div>`;
  texts.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item'; el.id = `ch-${ch.id}`;
    el.innerHTML = `<span>#</span> ${ch.name}`;
    el.onclick = () => joinChannel(ch);
    list.appendChild(el);
  });
  if (voices.length) list.innerHTML += `<div class="ch-category">Salons vocaux</div>`;
  voices.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item'; el.id = `ch-${ch.id}`;
    el.innerHTML = `<span>🔊</span> ${ch.name}`;
    el.onclick = () => toast('Audio/Vidéo bientôt disponible !');
    list.appendChild(el);
  });
}

function joinChannel(ch) {
  currentChannel = ch; lastMsgUser = null;
  document.getElementById('active-channel-name').textContent = ch.name;
  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ch-${ch.id}`);
  if (el) el.classList.add('active');
  document.getElementById('chat-area').innerHTML = '';
  socket.emit('join-channel', { channelId: ch.id });
}

socket.on('auth-success', u => console.log('✅ Socket auth', u.username));
socket.on('auth-error',   e => console.error('Socket auth error:', e));

socket.on('channel-history', ({ messages }) => {
  document.getElementById('chat-area').innerHTML = '';
  lastMsgUser = null;
  messages.forEach(renderMsg);
  scrollToBottom();
});

socket.on('new-msg', msg => { renderMsg(msg); scrollToBottom(); });

socket.on('user-status', ({ username, status }) => {
  toast(`${username} est ${status === 'online' ? 'en ligne 🟢' : 'hors ligne'}`);
});

function renderMsg(msg) {
  const area = document.getElementById('chat-area');
  if (msg.username === lastMsgUser) {
    const div = document.createElement('div');
    div.className = 'msg-continued';
    div.textContent = msg.content;
    area.appendChild(div);
  } else {
    const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    const div  = document.createElement('div');
    div.className = 'msg-group';
    div.innerHTML = `
      <img class="ava" src="${msg.avatar}" alt="${escHtml(msg.username)}">
      <div class="body">
        <div class="meta">
          <b>${escHtml(msg.username)}</b>
          <span class="pronouns">${escHtml(msg.pronouns)}</span>
          <time>${time}</time>
        </div>
        <p>${escHtml(msg.content)}</p>
      </div>`;
    area.appendChild(div);
    lastMsgUser = msg.username;
  }
}

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollToBottom() { const a = document.getElementById('chat-area'); a.scrollTop = a.scrollHeight; }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    const text = e.target.value.trim();
    if (!text || !currentChannel) return;
    socket.emit('send-msg', { channelId: currentChannel.id, content: text });
    e.target.value = '';
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Auto-login
(async () => {
  const token = localStorage.getItem('nexus_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp * 1000 < Date.now()) { localStorage.removeItem('nexus_token'); return; }
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({_token:token}) });
  } catch {}
})();
</script>
</body>
</html>
