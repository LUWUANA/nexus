<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --violet:   #6e57ff;
      --violet-2: #5a46e8;
      --neon:     #a78bfa;
      --bg:       #1e1f22;
      --bg-side:  #2b2d31;
      --bg-chat:  #313338;
      --bg-input: #383a40;
      --bg-dark:  #111214;
      --text:     #dbdee1;
      --muted:    #949ba4;
      --green:    #23a55a;
      --red:      #f23f43;
      --radius:   8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── Auth Overlay ─────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 60%, #0a0a14 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: rgba(30, 20, 60, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      box-shadow: 0 0 60px rgba(110, 87, 255, 0.2), 0 24px 64px rgba(0,0,0,.6);
    }
    .auth-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 2.4rem; font-weight: 700;
      color: var(--neon);
      text-shadow: 0 0 20px rgba(167,139,250,.8), 0 0 40px rgba(110,87,255,.5);
      letter-spacing: .05em;
    }
    .auth-sub { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 32px; line-height: 1.5; }

    .auth-tabs { display: flex; margin-bottom: 28px; border-radius: var(--radius); overflow: hidden; gap: 4px; }
    .auth-tab  { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,.05); color: var(--muted); font-size: .9rem; font-weight: 500; border-radius: var(--radius); transition: .2s; }
    .auth-tab.active { background: var(--violet); color: #fff; }

    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .auth-field input {
      width: 100%; padding: 12px 14px;
      background: #1e1e2e; border: 1.5px solid rgba(110,87,255,.3);
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .auth-field input:focus { border-color: var(--violet); }
    .auth-field input::placeholder { color: var(--muted); }

    .auth-button {
      width: 100%; padding: 14px; background: var(--violet);
      color: #fff; border: none; border-radius: var(--radius);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background .2s; margin-top: 12px;
    }
    .auth-button:hover { background: var(--violet-2); }
    .auth-error { color: var(--red); font-size: .85rem; text-align: center; margin-top: 16px; }

    /* ── Main Layout ──────────────────────────────────────────────── */
    .app-container { display: flex; height: 100%; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: 240px; background: var(--bg-side);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,.2);
    }
    .sidebar-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid rgba(0,0,0,.2);
      height: 60px;
    }
    .sidebar-header .logo { font-size: 1.2rem; font-weight: 700; color: var(--text); }
    .sidebar-actions { display: flex; gap: 8px; }
    .action-btn {
      background: var(--bg-input); border: none; border-radius: var(--radius);
      color: var(--muted); font-size: 1.2rem; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .action-btn:hover { background: var(--violet); color: #fff; }

    .server-list, .dm-list {
      flex-shrink: 0; padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,.2);
      max-height: calc(100vh - 60px - 60px - 120px); /* Adjust as needed */
      overflow-y: auto;
    }
    .dm-list.hidden { display: none; }
    .server-list.hidden { display: none; }

    .dm-list-header {
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted); margin-bottom: 12px;
    }
    .dm-user-item {
      display: flex; align-items: center; padding: 8px 10px;
      border-radius: var(--radius); cursor: pointer;
      transition: background .2s; margin-bottom: 4px;
    }
    .dm-user-item:hover { background: rgba(110,87,255,.1); }
    .dm-user-item.active { background: var(--violet); color: #fff; }
    .dm-user-item.active .dm-user-pronouns, .dm-user-item.active .dm-user-status { color: #fff; }

    .dm-user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      margin-right: 10px; background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--neon);
      overflow: hidden;
    }
    .dm-user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .dm-user-info { flex-grow: 1; }
    .dm-user-name { font-weight: 500; font-size: .95rem; }
    .dm-user-pronouns { font-size: .75rem; color: var(--muted); }
    .dm-user-status {
      width: 8px; height: 8px; border-radius: 50%;
      margin-left: 8px; flex-shrink: 0;
    }
    .dm-user-status.online { background: var(--green); }
    .dm-user-status.offline { background: var(--muted); }
    .dm-user-status.dnd { background: var(--red); }


    .server-item {
      display: flex; align-items: center; padding: 8px 10px;
      border-radius: var(--radius); cursor: pointer;
      transition: background .2s; margin-bottom: 4px;
    }
    .server-item:hover { background: rgba(110,87,255,.1); }
    .server-item.active { background: var(--violet); color: #fff; }
    .server-item.active .server-icon { background: #fff; color: var(--violet); }

    .server-icon {
      width: 32px; height: 32px; border-radius: 50%;
      margin-right: 10px; background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: var(--neon);
      overflow: hidden;
    }
    .server-icon img { width: 100%; height: 100%; object-fit: cover; }

    .server-name { font-weight: 500; font-size: .95rem; }

    .channel-list {
      flex-grow: 1; padding: 12px 16px; overflow-y: auto;
    }
    .channel-list.hidden { display: none; }

    .channel-category {
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted); margin-bottom: 12px;
      margin-top: 16px;
    }
    .channel-item {
      display: flex; align-items: center; padding: 8px 10px;
      border-radius: var(--radius); cursor: pointer;
      transition: background .2s; margin-bottom: 4px;
    }
    .channel-item:hover { background: rgba(255,255,255,.05); }
    .channel-item.active { background: var(--bg-input); color: var(--text); }
    .channel-item.active .channel-icon { color: var(--violet); }

    .channel-icon {
      font-size: 1.1rem; margin-right: 8px; color: var(--muted);
    }
    .channel-name { font-weight: 500; font-size: .95rem; }

    .user-panel {
      display: flex; align-items: center; padding: 12px 16px;
      background: var(--bg-dark); border-top: 1px solid rgba(0,0,0,.2);
      height: 60px; flex-shrink: 0;
    }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      margin-right: 10px; background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 700; color: var(--neon);
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex-grow: 1; }
    .user-name { font-weight: 500; font-size: .95rem; }
    .user-pronouns { font-size: .75rem; color: var(--muted); }
    .user-actions button {
      background: none; border: none; color: var(--muted);
      font-size: 1.1rem; cursor: pointer; margin-left: 8px;
      transition: color .2s;
    }
    .user-actions button:hover { color: var(--text); }

    /* ── Chat Area ────────────────────────────────────────────────── */
    .chat-area {
      flex-grow: 1; display: flex; flex-direction: column;
      background: var(--bg-chat);
    }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,.2);
      height: 60px;
    }
    .chat-header h2 { font-size: 1.1rem; font-weight: 700; }
    .chat-actions { display: flex; gap: 8px; }

    .message-list {
      flex-grow: 1; padding: 20px; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .message {
      display: flex; margin-bottom: 16px;
    }
    .message-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      margin-right: 12px; background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--neon);
      flex-shrink: 0; overflow: hidden;
    }
    .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .message-content { flex-grow: 1; }
    .message-meta { margin-bottom: 4px; }
    .message-author { font-weight: 700; margin-right: 8px; }
    .message-pronouns { font-size: .85rem; color: var(--muted); margin-right: 8px; }
    .message-time { font-size: .8rem; color: var(--muted); }
    .message-text { font-size: .95rem; line-height: 1.4; }

    .chat-input-area {
      padding: 20px; border-top: 1px solid rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    .message-form { display: flex; gap: 10px; }
    .message-input {
      flex-grow: 1; padding: 12px 16px;
      background: var(--bg-input); border: none;
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: .95rem; outline: none;
    }
    .message-input::placeholder { color: var(--muted); }
    .send-button {
      background: var(--violet); color: #fff; border: none;
      border-radius: var(--radius); padding: 12px 20px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: background .2s;
    }
    .send-button:hover { background: var(--violet-2); }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">NEXUS</div>
      <p class="auth-sub">Connectez-vous ou créez un compte pour rejoindre la conversation.</p>

      <div class="auth-tabs">
        <div class="auth-tab active" id="login-tab">Connexion</div>
        <div class="auth-tab" id="register-tab">Inscription</div>
      </div>

      <form id="auth-form">
        <div class="auth-field">
          <label for="username">Pseudo</label>
          <input type="text" id="username" placeholder="Votre pseudo" required minlength="2" maxlength="32">
        </div>
        <div class="auth-field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Votre mot de passe" required minlength="6">
        </div>
        <div class="auth-field hidden" id="pronouns-field">
          <label for="pronouns">Pronoms (optionnel)</label>
          <input type="text" id="pronouns" placeholder="iel/elle/il">
        </div>
        <button type="submit" class="auth-button" id="auth-submit-button">Se connecter</button>
        <p class="auth-error" id="auth-error"></p>
      </form>
    </div>
  </div>

  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">NEXUS</div>
        <div class="sidebar-actions">
          <button id="toggle-dms" class="action-btn" title="Messages privés">💬</button>
          <button class="action-btn" title="Créer un espace">+</button>
        </div>
      </div>
      <div class="server-list" id="server-list">
        <!-- Server items will be rendered here -->
      </div>
      <div class="dm-list hidden" id="dm-list">
        <div class="dm-list-header">Messages Privés</div>
        <div id="online-users-container"></div>
      </div>
      <div class="channel-list" id="channel-list">
        <!-- Channel items will be rendered here -->
      </div>
      <div class="user-panel">
        <div class="user-avatar" id="current-user-avatar">
          <!-- User avatar/initials -->
        </div>
        <div class="user-info">
          <div class="user-name" id="current-user-name"></div>
          <div class="user-pronouns" id="current-user-pronouns"></div>
        </div>
        <div class="user-actions">
          <button title="Déconnexion" id="logout-button">🚪</button>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        <h2 id="chat-header-title">Bienvenue sur NEXUS</h2>
        <div class="chat-actions">
          <button class="action-btn" title="Rechercher">🔍</button>
          <button class="action-btn" title="Appel vocal">📞</button>
          <button class="action-btn" title="Paramètres">⚙️</button>
        </div>
      </div>
      <div class="message-list" id="message-list">
        <!-- Messages will be rendered here -->
      </div>
      <div class="chat-input-area">
        <form class="message-form" id="message-form">
          <input type="text" id="message-input" class="message-input" placeholder="Envoyer un message...">
          <button type="submit" class="send-button">Envoyer</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const socket = io();

      // --- DOM Elements ---
      const authOverlay = document.getElementById('auth-overlay');
      const loginTab = document.getElementById('login-tab');
      const registerTab = document.getElementById('register-tab');
      const pronounsField = document.getElementById('pronouns-field');
      const authForm = document.getElementById('auth-form');
      const authSubmitButton = document.getElementById('auth-submit-button');
      const authError = document.getElementById('auth-error');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const pronounsInput = document.getElementById('pronouns');

      const serverList = document.getElementById('server-list');
      const channelList = document.getElementById('channel-list');
      const messageList = document.getElementById('message-list');
      const messageForm = document.getElementById('message-form');
      const messageInput = document.getElementById('message-input');
      const chatHeaderTitle = document.getElementById('chat-header-title');
      const currentUserAvatar = document.getElementById('current-user-avatar');
      const currentUserName = document.getElementById('current-user-name');
      const currentUserPronouns = document.getElementById('current-user-pronouns');
      const logoutButton = document.getElementById('logout-button');

      // DM specific elements
      const toggleDMsBtn = document.getElementById('toggle-dms');
      const dmList = document.getElementById('dm-list');
      const onlineUsersContainer = document.getElementById('online-users-container');

      // --- State Variables ---
      let isRegistering = false;
      let currentUser = null;
      let servers = [];
      let currentServer = null;
      let currentChannel = null;
      let currentDMUser = null; // Stores the user object of the active DM partner
      let onlineUsers = new Map(); // Map<userId, userObject>
      let dmMessageHistory = new Map(); // Map<userId, Array<messageObject>>

      // --- Auth Logic ---
      loginTab.addEventListener('click', () => {
        isRegistering = false;
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        pronounsField.classList.add('hidden');
        authSubmitButton.textContent = 'Se connecter';
        authError.textContent = '';
      });

      registerTab.addEventListener('click', () => {
        isRegistering = true;
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        pronounsField.classList.remove('hidden');
        authSubmitButton.textContent = 'S\'inscrire';
        authError.textContent = '';
      });

      authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        authError.textContent = '';

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        const pronouns = pronounsInput.value.trim();

        if (!username || !password) {
          authError.textContent = 'Pseudo et mot de passe sont requis.';
          return;
        }

        const endpoint = isRegistering ? '/api/register' : '/api/login';
        const body = { username, password };
        if (isRegistering && pronouns) body.pronouns = pronouns;

        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
document.getElementById('auth-overlay').style.display = 'none';
document.getElementById('app').style.display = 'grid';
socket.emit('auth', { token: data.token });

          } else {
            authError.textContent = data.error || 'Erreur d\'authentification.';
          }
        } catch (error) {
          console.error('Erreur réseau:', error);
          authError.textContent = 'Erreur de connexion au serveur.';
        }
      });

      logoutButton.addEventListener('click', () => {
        localStorage.removeItem('token');
        currentUser = null;
        currentServer = null;
        currentChannel = null;
        currentDMUser = null;
        servers = [];
        onlineUsers.clear();
        dmMessageHistory.clear();
        serverList.innerHTML = '';
        channelList.innerHTML = '';
        messageList.innerHTML = '';
        chatHeaderTitle.textContent = 'Bienvenue sur NEXUS';
        currentUserAvatar.innerHTML = '';
        currentUserName.textContent = '';
        currentUserPronouns.textContent = '';
        authOverlay.classList.remove('hidden');
        socket.disconnect(); // Disconnect and reconnect to clear session
        socket.connect();
      });

      // --- UI Rendering Functions ---
      function renderServers() {
        serverList.innerHTML = '';
        servers.forEach(server => {
          const serverItem = document.createElement('div');
          serverItem.className = `server-item ${currentServer && currentServer.id === server.id ? 'active' : ''}`;
          serverItem.dataset.serverId = server.id;
          serverItem.innerHTML = `
            <div class="server-icon">
              ${server.icon ? `<img src="${server.icon}" alt="${server.name[0]}">` : server.name[0].toUpperCase()}
            </div>
            <div class="server-name">${server.name}</div>
          `;
          serverItem.addEventListener('click', () => selectServer(server));
          serverList.appendChild(serverItem);
        });
      }

      function renderChannels(channels) {
        channelList.innerHTML = '';
        // Group channels by type or category if needed, for now just list them
        channels.forEach(channel => {
          const channelItem = document.createElement('div');
          channelItem.className = `channel-item ${currentChannel && currentChannel.id === channel.id ? 'active' : ''}`;
          channelItem.dataset.channelId = channel.id;
          channelItem.innerHTML = `
            <div class="channel-icon">#</div>
            <div class="channel-name">${channel.name}</div>
          `;
          channelItem.addEventListener('click', () => selectChannel(channel));
          channelList.appendChild(channelItem);
        });
      }

      // Helper to render online users in DM list
      function renderOnlineUsers() {
        onlineUsersContainer.innerHTML = '';
        const usersArray = Array.from(onlineUsers.values()).sort((a, b) => a.username.localeCompare(b.username));

        usersArray.forEach(user => {
          if (currentUser && user.id === currentUser.id) return; // Don't show self

          const userItem = document.createElement('div');
          userItem.className = `dm-user-item ${currentDMUser && currentDMUser.id === user.id ? 'active' : ''}`;
          userItem.dataset.userId = user.id;
          userItem.innerHTML = `
            <div class="dm-user-avatar">
              ${user.avatar ? `<img src="${user.avatar}" alt="${user.username[0]}">` : user.username[0].toUpperCase()}
            </div>
            <div class="dm-user-info">
              <div class="dm-user-name">@${user.username}</div>
              <div class="dm-user-pronouns">${user.pronouns}</div>
            </div>
            <div class="dm-user-status ${user.status}"></div>
          `;
          userItem.addEventListener('click', () => selectDMUser(user));
          onlineUsersContainer.appendChild(userItem);
        });
      }

      function displayMessage(msg, isDM = false) {
        const messageElement = document.createElement('div');
        messageElement.className = 'message';

        let sender = null;
        if (isDM) {
          sender = (msg.senderId === currentUser.id) ? currentUser : onlineUsers.get(msg.senderId);
        } else {
          // For channel messages, assume msg object contains sender info or look up from a global user list if available
          // For now, let's assume msg has sender_username, sender_avatar, sender_pronouns for channels
          sender = {
            username: msg.sender_username,
            avatar: msg.sender_avatar,
            pronouns: msg.sender_pronouns
          };
        }

        const senderName = sender ? sender.username : 'Inconnu';
        const senderAvatar = sender ? sender.avatar : '';
        const senderPronouns = sender ? sender.pronouns : '';

        messageElement.innerHTML = `
          <div class="message-avatar">
            ${senderAvatar ? `<img src="${senderAvatar}" alt="${senderName[0]}">` : senderName[0].toUpperCase()}
          </div>
          <div class="message-content">
            <div class="message-meta">
              <span class="message-author">@${senderName}</span>
              <span class="message-pronouns">(${senderPronouns})</span>
              <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
            </div>
            <div class="message-text">${msg.content}</div>
          </div>
        `;
        messageList.appendChild(messageElement);
        messageList.scrollTop = messageList.scrollHeight;
      }

      // --- Selection Logic ---
      function selectServer(server) {
        if (currentServer && currentServer.id === server.id) return;

        currentServer = server;
        currentChannel = null; // Clear active channel
        currentDMUser = null; // IMPORTANT: Clear active DM user

        // Update UI
        document.querySelectorAll('.server-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.server-item[data-server-id="${server.id}"]`).classList.add('active');
        chatHeaderTitle.textContent = server.name;
        messageList.innerHTML = ''; // Clear chat

        // Hide DM list, show server/channel list
        dmList.classList.add('hidden');
        serverList.classList.remove('hidden');
        channelList.classList.remove('hidden');

        socket.emit('request-channels', server.id);
      }

      function selectChannel(channel) {
        if (currentChannel && currentChannel.id === channel.id) return;

        currentChannel = channel;
        currentServer = servers.find(s => s.id === channel.server_id); // Ensure currentServer is set
        currentDMUser = null; // IMPORTANT: Clear active DM user

        // Update UI
        document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.channel-item[data-channel-id="${channel.id}"]`).classList.add('active');
        chatHeaderTitle.textContent = `#${channel.name}`;
        messageList.innerHTML = ''; // Clear chat

        // Hide DM list, show channel list
        dmList.classList.add('hidden');
        serverList.classList.remove('hidden'); // Ensure server list is visible
        channelList.classList.remove('hidden'); // Ensure channel list is visible

        socket.emit('join-channel', channel.id);
      }

      function selectDMUser(user) {
        if (currentDMUser && currentDMUser.id === user.id) return; // Already selected

        currentDMUser = user;
        currentServer = null; // Deselect channel/server
        currentChannel = null;

        // Update UI
        serverList.classList.add('hidden');
        channelList.classList.add('hidden');
        dmList.classList.remove('hidden'); // Ensure DM list is visible
        chatHeaderTitle.textContent = `DM avec @${user.username}`;
        messageList.innerHTML = ''; // Clear chat

        // Highlight active DM user
        document.querySelectorAll('.dm-user-item').forEach(item => item.classList.remove('active'));
        const activeDMItem = document.querySelector(`.dm-user-item[data-user-id="${user.id}"]`);
        if (activeDMItem) activeDMItem.classList.add('active');

        // Load DM history
        const history = dmMessageHistory.get(user.id) || [];
        history.forEach(msg => displayMessage(msg, true)); // true for DM
        messageList.scrollTop = messageList.scrollHeight;

        // Emit event to join DM room (server-side handles this)
        socket.emit('join-dm', user.id);
      }

      // Toggle DMs button click handler
      toggleDMsBtn.addEventListener('click', () => {
        if (dmList.classList.contains('hidden')) {
          // Switch to DM view
          serverList.classList.add('hidden');
          channelList.classList.add('hidden');
          dmList.classList.remove('hidden');
          chatHeaderTitle.textContent = 'Messages Privés';
          messageList.innerHTML = ''; // Clear chat
          currentServer = null;
          currentChannel = null;
          currentDMUser = null; // No specific DM selected yet

          // Request online users if not already populated or if stale
          socket.emit('request-online-users'); // Assuming server has this
          document.querySelectorAll('.dm-user-item').forEach(item => item.classList.remove('active')); // Clear active DM highlight
        } else {
          // Switch back to server/channel view (default)
          dmList.classList.add('hidden');
          serverList.classList.remove('hidden');
          // If a server was previously selected, show its channels
          if (currentServer) {
            channelList.classList.remove('hidden');
            chatHeaderTitle.textContent = currentChannel ? `#${currentChannel.name}` : currentServer.name;
            // Re-render channel messages if a channel was active
            if (currentChannel) {
              socket.emit('join-channel', currentChannel.id);
            } else {
              messageList.innerHTML = '';
            }
          } else {
            // No server selected, show default welcome or empty state
            chatHeaderTitle.textContent = 'Bienvenue sur NEXUS';
            messageList.innerHTML = '';
          }
          // Clear active DM user
          currentDMUser = null;
          document.querySelectorAll('.dm-user-item').forEach(item => item.classList.remove('active'));
        }
      });

      // --- Socket.IO Events ---
      socket.on('connect', () => {
        console.log('Connecté au serveur Socket.IO');
        const token = localStorage.getItem('token');
        if (token) {
          socket.emit('authenticate', token);
        }
      });

      socket.on('authenticated', (user) => {
        currentUser = user;
        authOverlay.classList.add('hidden');
        console.log('Authentifié comme', currentUser.username);

        // Update user panel
        currentUserAvatar.innerHTML = user.avatar ? `<img src="${user.avatar}" alt="${user.username[0]}">` : user.username[0].toUpperCase();
        currentUserName.textContent = `@${user.username}`;
        currentUserPronouns.textContent = `(${user.pronouns})`;

        // Request initial data
        socket.emit('request-servers');
        socket.emit('request-online-users'); // Request online users on auth
      });

      socket.on('unauthorized', () => {
        console.error('Authentification échouée ou expirée');
        localStorage.removeItem('token');
        authOverlay.classList.remove('hidden');
        currentUser = null;
      });

      socket.on('servers-list', (fetchedServers) => {
        servers = fetchedServers;
        renderServers();
        // Automatically select the first server and channel if none are active
        if (!currentServer && servers.length > 0) {
          selectServer(servers[0]);
        }
      });

      socket.on('channels-list', (fetchedChannels) => {
        renderChannels(fetchedChannels);
        // Automatically select the first channel if none are active
        if (!currentChannel && fetchedChannels.length > 0) {
          selectChannel(fetchedChannels[0]);
        }
      });

      socket.on('channel-history', (messages) => {
        if (!currentDMUser) { // Only display channel history if not in DM mode
          messageList.innerHTML = '';
          messages.forEach(msg => displayMessage(msg));
        }
      });

      socket.on('new-msg', (msg) => {
        if (currentChannel && msg.channel_id === currentChannel.id && !currentDMUser) {
          displayMessage(msg);
        }
      });

      // NEW: Handle online users list
      socket.on('users-online', (users) => {
        onlineUsers.clear();
        users.forEach(user => onlineUsers.set(user.id, user));
        if (!dmList.classList.contains('hidden')) { // Only re-render if DM list is visible
          renderOnlineUsers();
        }
      });

      // NEW: Handle user status updates
      socket.on('user-status-update', (user) => {
        onlineUsers.set(user.id, user);
        if (!dmList.classList.contains('hidden')) {
          renderOnlineUsers();
        }
        // Also update status in server/channel user lists if they exist (not implemented here)
      });

      // NEW: Handle private messages
      socket.on('private-msg', (msg) => {
        // msg should contain senderId, receiverId, content, created_at, and potentially sender/receiver user objects
        const senderId = msg.senderId;
        const receiverId = msg.receiverId;

        // Store in history
        const targetUserId = (senderId === currentUser.id) ? receiverId : senderId;
        if (!dmMessageHistory.has(targetUserId)) {
          dmMessageHistory.set(targetUserId, []);
        }
        dmMessageHistory.get(targetUserId).push(msg);

        // Display if it's the active DM
        if (currentDMUser && (currentDMUser.id === senderId || currentDMUser.id === receiverId)) {
          displayMessage(msg, true);
        }
      });

      // --- Message Sending ---
      messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const content = messageInput.value.trim();
        if (!content) return;

        if (currentDMUser) {
          // Send private message
          socket.emit('private-msg', { to: currentDMUser.id, content: content });
          // Optimistically add to local history and display
          const tempMsg = {
            senderId: currentUser.id,
            receiverId: currentDMUser.id,
            content: content,
            created_at: new Date().toISOString()
            // Add user info for display (will be looked up from currentUser/onlineUsers in displayMessage)
          };
          if (!dmMessageHistory.has(currentDMUser.id)) {
            dmMessageHistory.set(currentDMUser.id, []);
          }
          dmMessageHistory.get(currentDMUser.id).push(tempMsg);
          displayMessage(tempMsg, true);

        } else if (currentChannel) {
          // Send channel message (existing logic)
          socket.emit('send-msg', { channelId: currentChannel.id, content: content });
        } else {
          console.warn('No active channel or DM to send message to.');
        }
        messageInput.value = '';
      });

      // Initial check for token on load
      const initialToken = localStorage.getItem('token');
      if (initialToken) {
        socket.emit('authenticate', initialToken);
      } else {
        authOverlay.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
