<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Clone Discord Ultra-Inclusif</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #2e1a47;
      --neon-purple: #9d50ff;
      --neon-pink: #ff2a6d;
      --neon-blue: #05d9e8;
      --dark-bg: #1a122b;
      --light-text: #f0f0f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--light-text);
      display: grid;
      grid-template-columns: 80px 240px 1fr 240px;
      grid-template-rows: 48px 1fr 60px;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      grid-column: 1;
      grid-row: 1 / span 3;
      background-color: var(--deep-purple);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: var(--neon-purple);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    .server-icon.active {
      border-radius: 30%;
      background-color: var(--neon-blue);
    }

    /* Server List */
    .server-list {
      grid-column: 2;
      grid-row: 2;
      background-color: var(--deep-purple);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      overflow-y: auto;
    }

    .channel {
      padding: 10px 15px;
      display: flex;
      align-items: center;
      cursor: pointer;
      border-left: 3px solid transparent;
    }

    .channel.active {
      background-color: rgba(157, 80, 255, 0.2);
      border-left-color: var(--neon-purple);
    }

    /* Main Chat */
    .chat {
      grid-column: 3;
      grid-row: 1 / span 2;
      display: flex;
      flex-direction: column;
      background-color: #1e1530;
    }

    .chat-header {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      display: flex;
      margin-bottom: 15px;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--neon-purple);
      margin-right: 10px;
    }

    .message-content {
      flex: 1;
    }

    .message-input {
      padding: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
    }

    .message-input input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      background-color: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--light-text);
    }

    /* Members List */
    .members {
      grid-column: 4;
      grid-row: 2;
      background-color: var(--deep-purple);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      overflow-y: auto;
    }

    .member {
      padding: 10px 15px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .member:hover {
      background-color: rgba(157, 80, 255, 0.2);
    }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--neon-purple);
      margin-right: 10px;
      position: relative;
    }

    .member-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
      bottom: 0;
      right: 0;
      border: 2px solid var(--deep-purple);
    }

    .member-status.online {
      background-color: #43b581;
    }

    .member-status.idle {
      background-color: #faa61a;
    }

    .member-status.dnd {
      background-color: #f04747;
    }

    .member-status.offline {
      background-color: #747f8d;
    }

    /* User Panel */
    .user-panel {
      grid-column: 1 / span 2;
      grid-row: 3;
      background-color: var(--deep-purple);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px;
      display: flex;
      align-items: center;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--neon-purple);
      margin-right: 10px;
      cursor: pointer;
      position: relative;
    }

    .user-info {
      flex: 1;
    }

    .user-status-input {
      background: none;
      border: none;
      color: var(--light-text);
      width: 100%;
      font-size: 12px;
      margin-top: 2px;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background-color: var(--deep-purple);
      padding: 20px;
      border-radius: 10px;
      width: 500px;
      max-width: 90%;
      border: 1px solid var(--neon-purple);
    }

    .profile-modal {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-banner {
      width: 100%;
      height: 120px;
      background-color: var(--neon-purple);
      border-radius: 5px;
      margin-bottom: 20px;
      position: relative;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--neon-blue);
      position: absolute;
      bottom: -40px;
      left: 20px;
      border: 4px solid var(--deep-purple);
    }

    .profile-info {
      margin-top: 50px;
      width: 100%;
    }

    .profile-badges {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .badge {
      background-color: rgba(157, 80, 255, 0.3);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .soundboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .sound-btn {
      padding: 10px;
      background-color: var(--neon-purple);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .dm-modal .chat-messages {
      height: 300px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="server-icon active">
      <i class="fas fa-home"></i>
    </div>
    <div class="server-icon">
      <i class="fas fa-plus"></i>
    </div>
  </div>

  <!-- Server List -->
  <div class="server-list">
    <div class="channel active">
      <i class="fas fa-hashtag"></i>
      <span>général</span>
    </div>
    <div class="channel">
      <i class="fas fa-volume-up"></i>
      <span>voix</span>
    </div>
  </div>

  <!-- Main Chat -->
  <div class="chat">
    <div class="chat-header">
      <i class="fas fa-hashtag"></i>
      <span>général</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <!-- Messages will be loaded here -->
    </div>
    <div class="message-input">
      <input type="text" placeholder="Message #général" id="message-input">
    </div>
  </div>

  <!-- Members List -->
  <div class="members" id="members-list">
    <!-- Members will be loaded here -->
  </div>

  <!-- User Panel -->
  <div class="user-panel">
    <div class="user-avatar" id="user-avatar">
      <div class="member-status online"></div>
    </div>
    <div class="user-info">
      <div id="user-username">Utilisateur</div>
      <input type="text" class="user-status-input" id="user-status-input" placeholder="Statut personnalisé...">
    </div>
    <i class="fas fa-headphones" id="soundboard-btn"></i>
    <i class="fas fa-envelope" id="dm-btn"></i>
  </div>

  <!-- Profile Modal -->
  <div class="modal" id="profile-modal">
    <div class="modal-content profile-modal">
      <div class="profile-banner" id="profile-banner">
        <div class="profile-avatar" id="profile-avatar"></div>
      </div>
      <div class="profile-info">
        <h2 id="profile-username">Utilisateur</h2>
        <div id="profile-pronouns">Pronoms: iel</div>
        <div id="profile-bio">Bio: Aucune bio définie</div>
        <div class="profile-badges" id="profile-badges"></div>
        <div style="margin-top: 20px;">
          <label for="profile-bio-input">Bio:</label>
          <textarea id="profile-bio-input" style="width: 100%; margin-top: 5px;" rows="3"></textarea>
          <label for="profile-pronouns-input" style="margin-top: 10px;">Pronoms:</label>
          <input type="text" id="profile-pronouns-input" style="width: 100%; margin-top: 5px;">
          <button id="save-profile-btn" style="margin-top: 10px; padding: 5px 10px;">Sauvegarder</button>
        </div>
      </div>
      <button style="margin-top: 20px; padding: 5px 10px;" id="close-profile-btn">Fermer</button>
    </div>
  </div>

  <!-- DM Modal -->
  <div class="modal" id="dm-modal">
    <div class="modal-content dm-modal">
      <h2>Messages Privés</h2>
      <div style="margin: 10px 0;">
        <select id="dm-user-select" style="width: 100%; padding: 5px;">
          <option value="">Sélectionner un utilisateur</option>
        </select>
      </div>
      <div class="chat-messages" id="dm-messages"></div>
      <div class="message-input">
        <input type="text" placeholder="Message privé..." id="dm-message-input">
      </div>
      <button style="margin-top: 10px; padding: 5px 10px;" id="close-dm-btn">Fermer</button>
    </div>
  </div>

  <!-- Soundboard Modal -->
  <div class="modal" id="soundboard-modal">
    <div class="modal-content">
      <h2>Soundboard</h2>
      <div class="soundboard">
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3">Jump</button>
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.mp3">Bling</button>
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3">Win</button>
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-losing-bleeps-2026.mp3">Lose</button>
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3">Notify</button>
        <button class="sound-btn" data-sound="https://assets.mixkit.co/sfx/preview/mixkit-retro-game-emergency-alarm-1000.mp3">Alarm</button>
      </div>
      <button style="margin-top: 20px; padding: 5px 10px;" id="close-soundboard-btn">Fermer</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Auth
    const token = localStorage.getItem('nexus-token');
    if (!token) window.location.href = '/login.html';

    const socket = io({
      auth: { token }
    });

    // DOM Elements
    const userAvatar = document.getElementById('user-avatar');
    const userUsername = document.getElementById('user-username');
    const userStatusInput = document.getElementById('user-status-input');
    const membersList = document.getElementById('members-list');
    const profileModal = document.getElementById('profile-modal');
    const dmModal = document.getElementById('dm-modal');
    const soundboardModal = document.getElementById('soundboard-modal');
    const dmUserSelect = document.getElementById('dm-user-select');
    const dmMessages = document.getElementById('dm-messages');
    const dmMessageInput = document.getElementById('dm-message-input');
    const profileUsername = document.getElementById('profile-username');
    const profilePronouns = document.getElementById('profile-pronouns');
    const profileBio = document.getElementById('profile-bio');
    const profileBadges = document.getElementById('profile-badges');
    const profileBioInput = document.getElementById('profile-bio-input');
    const profilePronounsInput = document.getElementById('profile-pronouns-input');
    const saveProfileBtn = document.getElementById('save-profile-btn');
    const closeProfileBtn = document.getElementById('close-profile-btn');
    const closeDmBtn = document.getElementById('close-dm-btn');
    const closeSoundboardBtn = document.getElementById('close-soundboard-btn');
    const soundboardBtn = document.getElementById('soundboard-btn');
    const dmBtn = document.getElementById('dm-btn');

    let currentUser = {};
    let connectedUsers = [];

    // Fetch current user
    fetch('/api/@me', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(user => {
      currentUser = user;
      userUsername.textContent = user.username;
      userStatusInput.value = user.customStatus;
      userStatusInput.placeholder = user.customStatus || 'Statut personnalisé...';
      
      if (user.avatar) {
        userAvatar.style.backgroundImage = `url(/uploads/${user.avatar})`;
        userAvatar.style.backgroundSize = 'cover';
        document.getElementById('profile-avatar').style.backgroundImage = `url(/uploads/${user.avatar})`;
        document.getElementById('profile-avatar').style.backgroundSize = 'cover';
      }
      
      if (user.banner) {
        document.getElementById('profile-banner').style.backgroundImage = `url(/uploads/${user.banner})`;
        document.getElementById('profile-banner').style.backgroundSize = 'cover';
      }
      
      profileUsername.textContent = user.username;
      profilePronouns.textContent = `Pronoms: ${user.pronouns}`;
      profileBio.textContent = `Bio: ${user.bio || 'Aucune bio définie'}`;
      profileBioInput.value = user.bio || '';
      profilePronounsInput.value = user.pronouns || 'iel';
      
      user.badges.forEach(badge => {
        const badgeElement = document.createElement('div');
        badgeElement.className = 'badge';
        badgeElement.textContent = badge;
        profileBadges.appendChild(badgeElement);
      });
    });

    // Update user status
    userStatusInput.addEventListener('change', () => {
      fetch('/api/@me/status', {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ customStatus: userStatusInput.value })
      });
    });

    // Socket.io events
    socket.on('user-status', (users) => {
      connectedUsers = users;
      membersList.innerHTML = '';
      dmUserSelect.innerHTML = '<option value="">Sélectionner un utilisateur</option>';
      
      users.forEach(user => {
        // Add to members list
        const memberElement = document.createElement('div');
        memberElement.className = 'member';
        memberElement.innerHTML = `
          <div class="member-avatar">
            <div class="member-status ${user.status}"></div>
          </div>
          <div>
            <div>${user.username}</div>
            <div style="font-size: 12px; color: #aaa;">${user.customStatus || ''}</div>
          </div>
        `;
        memberElement.addEventListener('click', () => openDm(user.id));
        membersList.appendChild(memberElement);
        
        // Add to DM select
        const option = document.createElement('option');
        option.value = user.id;
        option.textContent = user.username;
        dmUserSelect.appendChild(option);
      });
    });

    socket.on('private-msg', (message) => {
      if (message.sender_id === currentUser.id || message.receiver_id === currentUser.id) {
        displayDmMessage(message);
      }
    });

    socket.on('play-sound', ({ soundUrl }) => {
      const audio = new Audio(soundUrl);
      audio.play();
    });

    // DM Functions
    function openDm(userId) {
      dmModal.classList.add('active');
      dmMessages.innerHTML = '';
      
      fetch(`/api/dm/${userId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(messages => {
        messages.forEach(displayDmMessage);
      });
    }

    function displayDmMessage(message) {
      const messageElement = document.createElement('div');
      messageElement.className = 'message';
      messageElement.innerHTML = `
        <div class="message-avatar"></div>
        <div class="message-content">
          <div>
            <strong>${message.sender_id === currentUser.id ? currentUser.username : connectedUsers.find(u => u.id === message.sender_id)?.username}</strong>
            <span style="font-size: 12px; color: #aaa; margin-left: 5px;">${new Date(message.created_at).toLocaleTimeString()}</span>
          </div>
          <div>${message.content}</div>
        </div>
      `;
      dmMessages.appendChild(messageElement);
      dmMessages.scrollTop = dmMessages.scrollHeight;
    }

    dmMessageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && dmUserSelect.value) {
        const content = dmMessageInput.value;
        if (!content) return;
        
        socket.emit('private-msg', {
          to: dmUserSelect.value,
          content
        });
        
        dmMessageInput.value = '';
      }
    });

    // Profile Functions
    userAvatar.addEventListener('click', () => {
      profileModal.classList.add('active');
    });

    saveProfileBtn.addEventListener('click', () => {
      const formData = new FormData();
      formData.append('bio', profileBioInput.value);
      formData.append('pronouns', profilePronounsInput.value);
      
      fetch('/api/@me/profile', {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      }).then(() => {
        profileBio.textContent = `Bio: ${profileBioInput.value || 'Aucune bio définie'}`;
        profilePronouns.textContent = `Pronoms: ${profilePronounsInput.value || 'iel'}`;
      });
    });

    // Soundboard Functions
    soundboardBtn.addEventListener('click', () => {
      soundboardModal.classList.add('active');
    });
    
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const soundUrl = btn.getAttribute('data-sound');
        socket.emit('play-sound', { soundUrl });
        const audio = new Audio(soundUrl);
        audio.play();
      });
    });

    // Modal Close Events
    closeProfileBtn.addEventListener('click', () => {
      profileModal.classList.remove('active');
    });
    
    closeDmBtn.addEventListener('click', () => {
      dmModal.classList.remove('active');
    });
    
    closeSoundboardBtn.addEventListener('click', () => {
      soundboardModal.classList.remove('active');
    });
    
    dmBtn.addEventListener('click', () => {
      dmModal.classList.add('active');
    });
  </script>
</body>
</html>
