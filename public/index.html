<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --violet:   #6e57ff;
      --violet-2: #5a46e8;
      --neon:     #a78bfa;
      --bg:       #1e1f22;
      --bg-side:  #2b2d31;
      --bg-chat:  #313338;
      --bg-input: #383a40;
      --bg-dark:  #111214;
      --text:     #dbdee1;
      --muted:    #949ba4;
      --green:    #23a55a;
      --red:      #f23f43;
      --radius:   8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── Auth Overlay ─────────────────────────────────────────────── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d1a 60%, #0a0a14 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-card {
      background: rgba(30, 20, 60, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 20px;
      padding: 48px 40px;
      width: 460px;
      box-shadow: 0 0 60px rgba(110, 87, 255, 0.2), 0 24px 64px rgba(0,0,0,.6);
    }
    .auth-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 2.4rem; font-weight: 700;
      color: var(--neon);
      text-shadow: 0 0 20px rgba(167,139,250,.8), 0 0 40px rgba(110,87,255,.5);
      letter-spacing: .05em;
    }
    .auth-sub { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 32px; line-height: 1.5; }

    .auth-tabs { display: flex; margin-bottom: 28px; border-radius: var(--radius); overflow: hidden; gap: 4px; }
    .auth-tab  { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,.05); color: var(--muted); font-size: .9rem; font-weight: 500; border-radius: var(--radius); transition: .2s; }
    .auth-tab.active { background: var(--violet); color: #fff; }

    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
    .auth-field input {
      width: 100%; padding: 12px 14px;
      background: #1e1e2e; border: 1.5px solid rgba(110,87,255,.3);
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .auth-field input:focus { border-color: var(--violet); }
    .auth-field input::placeholder { color: var(--muted); }
    
    /* ── DM Interface ────────────────────────────────────────────── */
    #dm-container {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      z-index: 100;
    }
    
    .dm-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-side);
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    }
    
    .dm-back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      margin-right: 12px;
    }
    
    .dm-messages {
      height: calc(100% - 120px);
      overflow-y: auto;
      padding: 16px;
    }
    
    .dm-message {
      display: flex;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    
    .dm-message .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }
    
    .dm-message-content {
      max-width: 70%;
      background: var(--bg-chat);
      padding: 8px 12px;
      border-radius: var(--radius);
      word-wrap: break-word;
    }
    
    .dm-message-sent .dm-message-content {
      background: var(--violet);
    }
    
    .dm-input-area {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      background: var(--bg-side);
      border-top: 1px solid rgba(0, 0, 0, 0.2);
    }
    
    .dm-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: none;
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }
    
    .dm-input:focus {
      border: 1px solid var(--violet);
    }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="auth-card">
      <h1 class="auth-logo">NEXUS</h1>
      <p class="auth-sub">Un espace bienveillant pour échanger, créer et s'épanouir ensemble.</p>
      
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>
      
      <div id="login-form">
        <div class="auth-field">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" />
        </div>
        <div class="auth-field">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" />
        </div>
        <button id="login-btn" class="auth-btn">Se connecter</button>
      </div>
      
      <div id="register-form" style="display: none;">
        <div class="auth-field">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" />
        </div>
        <div class="auth-field">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" />
        </div>
        <div class="auth-field">
          <label for="register-pronouns">Pronoms (optionnel)</label>
          <input type="text" id="register-pronouns" placeholder="iel / iels / il / elle / ..." />
        </div>
        <button id="register-btn" class="auth-btn">S'inscrire</button>
      </div>
    </div>
  </div>
  
  <div id="dm-container">
    <div class="dm-header">
      <button class="dm-back-btn">←</button>
      <h2 id="dm-username">Utilisateur</h2>
    </div>
    <div class="dm-messages" id="dm-messages"></div>
    <div class="dm-input-area">
      <input type="text" class="dm-input" id="dm-input" placeholder="Écrivez un message..." />
    </div>
  </div>
  
  <script>
    // Gestion de l'authentification
    const authOverlay = document.getElementById('auth-overlay');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const tabs = document.querySelectorAll('.auth-tab');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        if (tab.dataset.tab === 'login') {
          loginForm.style.display = 'block';
          registerForm.style.display = 'none';
        } else {
          loginForm.style.display = 'none';
          registerForm.style.display = 'block';
        }
      });
    });
    
    // Initialisation Socket.io
    const socket = io();
    let currentUser = null;
    let currentDmUser = null;
    
    // Gestion des DM
    const dmContainer = document.getElementById('dm-container');
    const dmBackBtn = document.querySelector('.dm-back-btn');
    const dmMessages = document.getElementById('dm-messages');
    const dmInput = document.getElementById('dm-input');
    const dmUsername = document.getElementById('dm-username');
    
    dmBackBtn.addEventListener('click', () => {
      dmContainer.style.display = 'none';
    });
    
    dmInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && dmInput.value.trim() !== '') {
        socket.emit('send_private_message', {
          from: currentUser.id,
          to: currentDmUser.id,
          text: dmInput.value.trim()
        });
        dmInput.value = '';
      }
    });
    
    // Écoute des messages privés
    socket.on('receive_private_message', (message) => {
      const messageElement = document.createElement('div');
      messageElement.classList.add('dm-message');
      
      if (message.from === currentUser.id) {
        messageElement.classList.add('dm-message-sent');
      }
      
      messageElement.innerHTML = `
        <img src="${message.from === currentUser.id ? currentUser.avatar : currentDmUser.avatar}" class="avatar" />
        <div class="dm-message-content">${message.text}</div>
      `;
      
      dmMessages.appendChild(messageElement);
      dmMessages.scrollTop = dmMessages.scrollHeight;
    });
    
    socket.on('dm_history', (history) => {
      dmMessages.innerHTML = '';
      history.forEach(message => {
        const messageElement = document.createElement('div');
        messageElement.classList.add('dm-message');
        
        if (message.from === currentUser.id) {
          messageElement.classList.add('dm-message-sent');
        }
        
        messageElement.innerHTML = `
          <img src="${message.from === currentUser.id ? currentUser.avatar : currentDmUser.avatar}" class="avatar" />
          <div class="dm-message-content">${message.text}</div>
        `;
        
        dmMessages.appendChild(messageElement);
      });
      dmMessages.scrollTop = dmMessages.scrollHeight;
    });
    
    // Fonction pour ouvrir une conversation DM
    function openDm(user) {
      currentDmUser = user;
      dmUsername.textContent = user.username;
      dmContainer.style.display = 'flex';
      
      // Rejoindre la room DM
      socket.emit('join_dm', {
        user1: currentUser.id,
        user2: user.id
      });
    }
    
    // Exemple d'utilisation (à connecter avec le reste de l'UI)
    // openDm({ id: 2, username: 'ExempleUser', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=ExempleUser' });
  </script>
</body>
</html>
