<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --violet:    #6e57ff;
      --violet-2:  #5a46e8;
      --neon:      #a78bfa;
      --bg:        #1e1f22;
      --bg-side:   #2b2d31;
      --bg-chat:   #313338;
      --bg-input:  #383a40;
      --bg-dark:   #111214;
      --text:      #dbdee1;
      --text-muted:#949ba4;
      --green:     #23a55a;
      --red:       #f23f43;
      --radius:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Auth ───────────────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }

    .auth-card {
      background: var(--bg-side);
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .auth-card h1 { font-size: 1.8rem; font-weight: 700; color: var(--neon); text-align: center; margin-bottom: 4px; }
    .auth-card p  { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: .9rem; }

    .auth-tabs { display: flex; margin-bottom: 24px; border-radius: var(--radius); overflow: hidden; }
    .auth-tab  { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: var(--bg-input); color: var(--text-muted); font-size: .9rem; font-weight: 500; transition: .2s; }
    .auth-tab.active { background: var(--violet); color: #fff; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 12px 14px;
      background: var(--bg-input); border: 1.5px solid transparent;
      border-radius: var(--radius); color: var(--text);
      font-family: inherit; font-size: .95rem;
      transition: border-color .2s; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--violet); }
    .field select option { background: var(--bg-input); }

    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--violet); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn-primary:hover { background: var(--violet-2); }
  </style>
</head>
<body>
  <div id="auth-screen">
    <div class="auth-card">
      <h1>Bienvenue sur NEXUS</h1>
      <p>Un espace inclusif pour discuter, partager et créer.</p>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>

      <div id="login-form">
        <div class="field">
          <label for="login-username">PSEUDO</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">MOT DE PASSE</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" autocomplete="current-password">
        </div>
        <button class="btn-primary">Se connecter</button>
      </div>

      <div id="register-form" style="display: none;">
        <div class="field">
          <label for="register-username">PSEUDO</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="register-pronouns">PRONOMS</label>
          <select id="register-pronouns" required>
            <option value="iel" selected>iel (neutre,-e)</option>
            <option value="il/lui">il/lui</option>
            <option value="elle">elle</option>
            <option value="ielle">ielle</option>
            <option value="al">al</option>
            <option value="ol">ol</option>
            <option value="ul">ul</option>
            <option value="el">el</option>
            <option value="ael">ael</option>
            <option value="ey">ey</option>
            <option value="autres">autres</option>
          </select>
        </div>
        <div class="field">
          <label for="register-password">MOT DE PASSE</label>
          <input type="password" id="register-password" placeholder="Choisissez un mot de passe" autocomplete="new-password">
        </div>
        <button class="btn-primary">S'inscrire</button>
      </div>
    </div>
  </div>

  <script>
    // Gestion des onglets de connexion/inscription
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        if (tab.dataset.tab === 'login') {
          loginForm.style.display = 'block';
          registerForm.style.display = 'none';
        } else {
          loginForm.style.display = 'none';
          registerForm.style.display = 'block';
        }
      });
    });

    // Gestion de la connexion/inscription via Socket.io
    const socket = io();

    // Connexion
    document.querySelector('#login-form .btn-primary').addEventListener('click', () => {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      if (!username || !password) {
        alert('Veuillez remplir tous les champs.');
        return;
      }

      socket.emit('login', { username, password });
    });

    // Inscription
    document.querySelector('#register-form .btn-primary').addEventListener('click', () => {
      const username = document.getElementById('register-username').value.trim();
      const pronouns = document.getElementById('register-pronouns').value;
      const password = document.getElementById('register-password').value;

      if (!username || !password) {
        alert('Veuillez remplir tous les champs.');
        return;
      }

      socket.emit('register', { username, pronouns, password });
    });

    // Réception du token après connexion/inscription
    socket.on('authSuccess', (data) => {
      localStorage.setItem('nexus_token', data.token);
      document.getElementById('auth-screen').style.display = 'none';
      socket.emit('fetchUserData');
    });

    // Gestion des erreurs
    socket.on('authError', (error) => {
      alert(error.message);
    });
  </script>
</body>
</html>
