<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --violet-primary: #6e57ff;
      --violet-secondary: #5a46e8;
      --neon-accent: #a78bfa;
      --bg-primary: #121217;
      --bg-secondary: #1e1f29;
      --bg-tertiary: #2b2d3a;
      --bg-elevated: #313342;
      --bg-input: #383a4a;
      --bg-message: #3a3c4e;
      --text-primary: #e0e0e6;
      --text-secondary: #a1a1b5;
      --text-accent: #a78bfa;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(110, 87, 255, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ——— Auth ————————————————————————————————————————————————————————————————— */
    #auth-screen {
      position: fixed; inset: 0;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }

    .auth-card {
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 420px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(110, 87, 255, 0.1);
    }

    .auth-card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--neon-accent);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .auth-card p {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-elevated);
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--violet-primary);
      color: #fff;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .field input, .field select {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1px solid rgba(110, 87, 255, 0.2);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--violet-primary);
    }

    .field select option {
      background: var(--bg-elevated);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--violet-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }

    .btn-primary:hover {
      background: var(--violet-secondary);
    }

    #auth-error {
      color: #f23f43;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 14px;
      min-height: 20px;
    }

    /* ——— App ————————————————————————————————————————————————————————————————— */
    #app {
      display: none;
      grid-template-columns: 80px 260px 1fr;
      height: 100vh;
    }

    #app.visible {
      display: grid;
    }

    .hubs {
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 10px;
      overflow-y: auto;
    }

    .hub-item {
      position: relative;
      display: flex;
      align-items: center;
    }

    .hub-pill {
      width: 4px;
      height: 0;
      background: var(--neon-accent);
      border-radius: 0 4px 4px 0;
      position: absolute;
      left: 0;
      transition: height 0.2s;
    }

    .hub-item.active .hub-pill {
      height: 44px;
    }

    .hub-icon {
      width: 52px;
      height: 52px;
      background: var(--bg-tertiary);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      user-select: none;
      color: var(--text-primary);
      border: 2px solid transparent;
    }

    .hub-icon:hover, .hub-item.active .hub-icon {
      border-radius: 35%;
      background: var(--violet-primary);
      border-color: var(--neon-accent);
    }

    .hub-sep {
      width: 36px;
      height: 2px;
      background: var(--bg-elevated);
      border-radius: 1px;
    }

    .sidebar {
      background: var(--bg-tertiary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(110, 87, 255, 0.1);
    }

    .sidebar-header {
      padding: 18px 16px;
      font-weight: 600;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(110, 87, 255, 0.1);
      color: var(--neon-accent);
    }

    .channels-list {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .ch-category {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      padding: 14px 10px 6px;
    }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
      transition: all 0.15s;
    }

    .ch-item:hover {
      background: rgba(110, 87, 255, 0.1);
      color: var(--text-primary);
    }

    .ch-item.active {
      background: rgba(110, 87, 255, 0.2);
      color: var(--neon-accent);
    }

    .ch-item .icon {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .ch-item.active .icon {
      color: var(--neon-accent);
    }

    .chat {
      display: flex;
      flex-direction: column;
      background: var(--bg-elevated);
      position: relative;
    }

    .chat-header {
      padding: 12px 24px;
      border-bottom: 1px solid rgba(110, 87, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: var(--neon-accent);
      background: rgba(49, 51, 66, 0.5);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .chat-header .icon {
      font-size: 1.1rem;
    }

    .chat-profile {
      position: absolute;
      top: 12px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--violet-primary);
      cursor: pointer;
      position: relative;
    }

    .profile-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      border: 2px solid var(--bg-elevated);
    }

    .profile-avatar.offline::after {
      background: #6b7280;
    }

    #chat-area {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-bubble {
      background: var(--bg-message);
      padding: 14px 18px;
      border-radius: var(--radius-md);
      max-width: 70%;
      word-break: break-word;
      line-height: 1.5;
    }

    .message-bubble.sent {
      align-self: flex-end;
      background: var(--violet-primary);
      border-bottom-right-radius: 4px;
    }

    .message-bubble.received {
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message-bubble .author {
      font-weight: 600;
      color: var(--neon-accent);
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .message-bubble .pronouns {
      font-size: 0.7rem;
      color: var(--text-secondary);
      background: rgba(110, 87, 255, 0.15);
      padding: 2px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }

    .message-bubble time {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .typing-indicator {
      padding: 12px 24px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity 0.3s;
      height: 24px;
    }

    .typing-indicator.visible {
      opacity: 1;
    }

    .typing-indicator .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
    }

    .typing-indicator .dots {
      display: flex;
      gap: 3px;
    }

    .typing-indicator .dot {
      width: 6px;
      height: 6px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typingAnimation 1.4s infinite ease-in-out;
    }

    .typing-indicator .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-indicator .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingAnimation {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    .input-bar {
      padding: 0 24px 28px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border-radius: var(--radius-lg);
      padding: 0 20px;
      box-shadow: var(--shadow-sm);
    }

    .input-wrap input {
      flex: 1;
      background: none;
      border: none;
      padding: 16px 0;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.98rem;
      outline: none;
    }

    .input-wrap input::placeholder {
      color: var(--text-secondary);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(110, 87, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(110, 87, 255, 0.3);
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      padding: 14px 24px;
      border-radius: var(--radius-md);
      border-left: 3px solid var(--violet-primary);
      box-shadow: var(--shadow-md);
      font-size: 0.92rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>✦ NEXUS</h1>
    <p>Rejoins l'espace cyber-inclusif</p>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Connexion</div>
      <div class="auth-tab" onclick="switchTab('register')">Inscription</div>
    </div>

    <div id="tab-login">
      <div class="field"><label>Identifiant</label><input type="text" id="login-user" placeholder="ton_pseudo" autocomplete="username"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    </div>

    <div id="tab-register" style="display:none">
      <div class="field"><label>Identifiant</label><input type="text" id="reg-user" placeholder="ton_pseudo"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="reg-pass" placeholder="••••••••"></div>
      <div class="field">
        <label>Pronoms <span style="color:var(--violet-primary)">*</span></label>
        <select id="reg-pronouns">
          <option value="iel">iel (Inclusif)</option>
          <option value="il">il</option>
          <option value="elle">elle</option>
          <option value="iel/il">iel/il</option>
          <option value="iel/elle">iel/elle</option>
          <option value="Autre">Autre / Demander</option>
        </select>
      </div>
      <button class="btn-primary" onclick="doRegister()">Créer mon compte</button>
    </div>

    <div id="auth-error"></div>
  </div>
</div>

<div id="app">
  <div class="hubs" id="servers-list">
    <div class="hub-item active">
      <div class="hub-pill"></div>
      <div class="hub-icon" title="Nexus Core">✦</div>
    </div>
    <div class="hub-sep"></div>
    <div class="hub-item">
      <div class="hub-icon" title="Créer un hub" onclick="toast('Bientôt disponible !')">+</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Nexus Core</div>
    <div class="channels-list" id="channels-list"></div>
  </div>

  <div class="chat">
    <div class="chat-header">
      <span class="icon">●</span>
      <span id="active-channel-name">général</span>
      <div class="chat-profile">
        <div class="profile-avatar" id="my-avatar-btn">
          <img id="my-avatar" src="" alt="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
      </div>
    </div>
    <div id="chat-area"></div>
    <div class="typing-indicator" id="typing-indicator">
      <img class="avatar" id="typing-avatar" src="" alt="">
      <span id="typing-username"></span>
      <span class="pronouns" id="typing-pronouns"></span>
      <span> est en train d'écrire</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="chat-input" placeholder="Transmettre un message..." onkeydown="handleKey(event)" oninput="handleTyping()">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="snd-in" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<script>
let currentUser = null, currentChannel = null, lastMsgUser = null, typingTimeout = null;
const socket = io();
const typingUsers = new Map();

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i===0)===(tab==='login')));
  document.getElementById('tab-login').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab==='register' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  await authRequest('/api/login', {
    username: document.getElementById('login-user').value.trim(),
    password: document.getElementById('login-pass').value
  });
}

async function doRegister() {
  await authRequest('/api/register', {
    username: document.getElementById('reg-user').value.trim(),
    password: document.getElementById('reg-pass').value,
    pronouns: document.getElementById('reg-pronouns').value
  });
}

async function authRequest(url, body) {
  document.getElementById('auth-error').textContent = '';
  try {
    const res  = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) return document.getElementById('auth-error').textContent = data.error || 'Erreur inconnue';
    localStorage.setItem('nexus_token', data.token);
    startApp(data.user);
  } catch { document.getElementById('auth-error').textContent = 'Impossible de joindre le serveur'; }
}

function doLogout() { localStorage.removeItem('nexus_token'); location.reload(); }

async function startApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('my-avatar').src = user.avatar;
  document.getElementById('my-avatar-btn').classList.toggle('offline', user.status === 'offline');
  document.getElementById('snd-in').play().catch(()=>{});
  socket.emit('auth', { token: localStorage.getItem('nexus_token') });
  await loadServers();
}

async function loadServers() {
  const res     = await fetch('/api/servers');
  const servers = await res.json();
  if (!servers.length) return;
  const srv = servers[0];
  renderChannels(srv.channels);
  const firstText = srv.channels.find(c => c.type === 'text');
  if (firstText) joinChannel(firstText);
}

function renderChannels(channels) {
  const list   = document.getElementById('channels-list');
  const texts  = channels.filter(c => c.type === 'text');
  const voices = channels.filter(c => c.type === 'voice');
  list.innerHTML = '';
  if (texts.length)  list.innerHTML += `<div class="ch-category">Espaces texte</div>`;
  texts.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item'; el.id = `ch-${ch.id}`;
    el.innerHTML = `<span class="icon">●</span> ${ch.name}`;
    el.onclick = () => joinChannel(ch);
    list.appendChild(el);
  });
  if (voices.length) list.innerHTML += `<div class="ch-category">Scènes vocales</div>`;
  voices.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item'; el.id = `ch-${ch.id}`;
    el.innerHTML = `<span class="icon">🔊</span> ${ch.name}`;
    el.onclick = () => toast('Audio/Vidéo bientôt disponible !');
    list.appendChild(el);
  });
}

function joinChannel(ch) {
  currentChannel = ch; lastMsgUser = null;
  document.getElementById('active-channel-name').textContent = ch.name;
  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ch-${ch.id}`);
  if (el) el.classList.add('active');
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('typing-indicator').classList.remove('visible');
  typingUsers.clear();
  socket.emit('join-channel', { channelId: ch.id });
}

socket.on('auth-success', u => console.log('✅ Socket auth', u.username));
socket.on('auth-error',   e => console.error('Socket auth error:', e));

socket.on('channel-history', ({ messages }) => {
  document.getElementById('chat-area').innerHTML = '';
  lastMsgUser = null;
  messages.forEach(renderMsg);
  scrollToBottom();
});

socket.on('new-msg', msg => { renderMsg(msg); scrollToBottom(); });

socket.on('user-status', ({ userId, status }) => {
  if (userId === currentUser.id) {
    document.getElementById('my-avatar-btn').classList.toggle('offline', status === 'offline');
  }
  toast(`${status === 'online' ? '🟢' : '⚪'} ${typingUsers.get(userId)?.username || 'Un utilisateur'} est ${status}`);
});

socket.on('user-typing', ({ userId, username, pronouns }) => {
  if (userId === currentUser.id) return;
  typingUsers.set(userId, { username, pronouns });
  updateTypingIndicator();
});

socket.on('user-stop-typing', ({ userId }) => {
  typingUsers.delete(userId);
  updateTypingIndicator();
});

function updateTypingIndicator() {
  const indicator = document.getElementById('typing-indicator');
  if (typingUsers.size === 0) {
    indicator.classList.remove('visible');
    return;
  }
  const [userId, user] = typingUsers.entries().next().value;
  document.getElementById('typing-username').textContent = user.username;
  document.getElementById('typing-pronouns').textContent = user.pronouns;
  document.getElementById('typing-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(user.username)}`;
  indicator.classList.add('visible');
}

function renderMsg(msg) {
  const area = document.getElementById('chat-area');
  const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const bubble = document.createElement('div');
  bubble.className = `message-bubble ${msg.username === currentUser.username ? 'sent' : 'received'}`;
  bubble.innerHTML = `
    <div>
      <span class="author">${escHtml(msg.username)}</span>
      <span class="pronouns">${escHtml(msg.pronouns)}</span>
      <time>${time}</time>
    </div>
    <p>${escHtml(msg.content)}</p>
  `;
  area.appendChild(bubble);
}

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollToBottom() { const a = document.getElementById('chat-area'); a.scrollTop = a.scrollHeight; }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    const text = e.target.value.trim();
    if (!text || !currentChannel) return;
    socket.emit('send-msg', { channelId: currentChannel.id, content: text });
    e.target.value = '';
    socket.emit('typing-stop', { channelId: currentChannel.id });
  }
}

function handleTyping() {
  if (!currentChannel) return;
  socket.emit('typing-start', { channelId: currentChannel.id });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit('typing-stop', { channelId: currentChannel.id });
  }, 3000);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Auto-login
(async () => {
  const token = localStorage.getItem('nexus_token');
  if (!token) return;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp * 1000 < Date.now()) { localStorage.removeItem('nexus_token'); return; }
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({_token:token}) });
  } catch {}
})();
