<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Clone Discord Inclusif</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #6a0dad;
      --neon-purple: #b19cd9;
      --dark-bg: #1a1a2e;
      --darker-bg: #16213e;
      --accent: #0f3460;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: var(--dark-bg);
      color: white;
      display: flex;
      height: 100vh;
    }
    
    /* Profile Modal */
    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .profile-container {
      background-color: var(--darker-bg);
      border-radius: 10px;
      width: 600px;
      max-width: 90%;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(106, 13, 173, 0.5);
    }
    
    .profile-banner {
      height: 150px;
      background-color: var(--deep-purple);
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid var(--darker-bg);
      object-fit: cover;
      cursor: pointer;
    }
    
    .profile-info {
      padding: 20px;
    }
    
    .profile-username {
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .profile-pronouns {
      background-color: var(--deep-purple);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-left: 10px;
    }
    
    .profile-bio {
      margin: 15px 0;
      padding: 10px;
      background-color: rgba(106, 13, 173, 0.2);
      border-radius: 5px;
      min-height: 60px;
    }
    
    .profile-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0;
    }
    
    .badge {
      background-color: var(--neon-purple);
      color: white;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .profile-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .btn {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .btn-primary {
      background-color: var(--deep-purple);
      color: white;
    }
    
    .btn-secondary {
      background-color: var(--accent);
      color: white;
    }
    
    /* Soundboard */
    .soundboard-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .soundboard-container {
      background-color: var(--darker-bg);
      border-radius: 10px;
      width: 400px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(106, 13, 173, 0.5);
    }
    
    .soundboard-title {
      font-size: 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .soundboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .sound-btn {
      background-color: var(--deep-purple);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Existing styles */
    .sidebar {
      width: 70px;
      background-color: var(--darker-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }
    
    .server-icon {
      width: 50px;
      height: 50px;
      background-color: var(--deep-purple);
      border-radius: 50%;
      margin: 5px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .chat-header {
      background-color: var(--darker-bg);
      padding: 15px;
      border-bottom: 1px solid var(--deep-purple);
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .soundboard-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background-color: var(--deep-purple);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="server-icon">N</div>
  </div>
  
  <div class="main-content">
    <div class="chat-header">
      <div class="user-info">
        <img class="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=User" alt="Avatar">
        <span>Utilisateur</span>
      </div>
    </div>
  </div>
  
  <!-- Profile Modal -->
  <div class="profile-modal" id="profileModal">
    <div class="profile-container">
      <div class="profile-banner" id="profileBanner">
        <img class="profile-avatar" id="profileAvatar" src="" alt="Avatar">
      </div>
      <div class="profile-info">
        <div class="profile-username">
          <span id="profileUsername"></span>
          <span class="profile-pronouns" id="profilePronouns"></span>
        </div>
        <div class="profile-bio" id="profileBio" contenteditable="true"></div>
        <div class="profile-badges" id="profileBadges"></div>
        <div class="profile-actions">
          <button class="btn btn-primary" id="saveProfileBtn">Sauvegarder</button>
          <button class="btn btn-secondary" id="closeProfileBtn">Fermer</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Soundboard Modal -->
  <div class="soundboard-modal" id="soundboardModal">
    <div class="soundboard-container">
      <div class="soundboard-title">Soundboard 🎵</div>
      <div class="soundboard-grid" id="soundboardGrid"></div>
      <button class="btn btn-secondary" id="closeSoundboardBtn" style="margin-top: 15px; width: 100%;">Fermer</button>
    </div>
  </div>
  
  <div class="soundboard-icon" id="soundboardIcon">
    <i class="fas fa-music"></i>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ auth: { token: localStorage.getItem('nexus_token') } });
    const userId = localStorage.getItem('nexus_userId');
    
    // Profile Modal
    const profileModal = document.getElementById('profileModal');
    const profileAvatar = document.getElementById('profileAvatar');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    
    document.querySelector('.user-avatar').addEventListener('click', async () => {
      const response = await fetch(`/api/profile/${userId}`);
      const profile = await response.json();
      
      profileAvatar.src = profile.avatar;
      document.getElementById('profileUsername').textContent = profile.username;
      document.getElementById('profilePronouns').textContent = profile.pronouns;
      document.getElementById('profileBio').textContent = profile.bio || 'Aucune bio pour le moment';
      
      const badgesContainer = document.getElementById('profileBadges');
      badgesContainer.innerHTML = '';
      profile.badges.forEach(badge => {
        const badgeElement = document.createElement('span');
        badgeElement.className = 'badge';
        badgeElement.textContent = badge;
        badgesContainer.appendChild(badgeElement);
      });
      
      document.getElementById('profileBanner').style.backgroundColor = profile.banner_color;
      if (profile.banner_image) {
        document.getElementById('profileBanner').style.backgroundImage = `url(${profile.banner_image})`;
        document.getElementById('profileBanner').style.backgroundSize = 'cover';
      }
      
      profileModal.style.display = 'flex';
    });
    
    closeProfileBtn.addEventListener('click', () => {
      profileModal.style.display = 'none';
    });
    
    saveProfileBtn.addEventListener('click', async () => {
      const bio = document.getElementById('profileBio').textContent;
      const bannerColor = document.getElementById('profileBanner').style.backgroundColor;
      
      const response = await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: localStorage.getItem('nexus_token'),
          bio,
          banner_color: bannerColor,
          banner_image: document.getElementById('profileBanner').style.backgroundImage.replace(/url\("|"\/g, '')
        })
      });
      
      if (response.ok) {
        alert('Profil sauvegardé !');
        profileModal.style.display = 'none';
      }
    });
    
    // Soundboard
    const soundboardModal = document.getElementById('soundboardModal');
    const soundboardIcon = document.getElementById('soundboardIcon');
    const closeSoundboardBtn = document.getElementById('closeSoundboardBtn');
    
    soundboardIcon.addEventListener('click', async () => {
      const response = await fetch('/api/soundboard');
      const { sounds } = await response.json();
      
      const soundboardGrid = document.getElementById('soundboardGrid');
      soundboardGrid.innerHTML = '';
      
      sounds.forEach(sound => {
        const button = document.createElement('button');
        button.className = 'sound-btn';
        button.innerHTML = `<i class="fas fa-play"></i> ${sound.name}`;
        button.addEventListener('click', () => {
          const audio = new Audio(sound.url);
          audio.play();
          socket.emit('play_sound', { soundUrl: sound.url });
        });
        soundboardGrid.appendChild(button);
      });
      
      soundboardModal.style.display = 'flex';
    });
    
    closeSoundboardBtn.addEventListener('click', () => {
      soundboardModal.style.display = 'none';
    });
    
    socket.on('play_sound', ({ soundUrl, userId }) => {
      if (userId !== localStorage.getItem('nexus_userId')) {
        const audio = new Audio(soundUrl);
        audio.play();
      }
    });
  </script>
</body>
</html>
