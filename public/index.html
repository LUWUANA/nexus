<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --deep-purple: #0d0d1a;
      --deep-purple-2: #12122a;
      --violet-neon: #7c3aed;
      --violet-neon-2: #a855f7;
      --violet-neon-3: #e879f9;
      --bg: var(--deep-purple);
      --bg-side: var(--deep-purple-2);
      --bg-chat: #1a1b2e;
      --bg-input: #2a2b40;
      --bg-dark: #08080f;
      --text: #e0e0e6;
      --text-muted: #949ba4;
      --green: #23a55a;
      --red: #f23f43;
      --radius: 8px;
      --glow: 0 0 12px rgba(168, 85, 247, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 72px 240px 1fr 240px;
      grid-template-rows: 100vh;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #hubs-bar {
      background: var(--bg-side);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 8px;
      border-right: 1px solid rgba(124, 58, 237, 0.2);
    }

    #hubs-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .hub-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      margin: 0 auto;
    }

    .hub-icon.active, .hub-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
      border-radius: 30%;
    }

    .hub-icon::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 32px;
      background: var(--violet-neon);
      border-radius: 0 4px 4px 0;
      opacity: 0;
    }

    .hub-icon.active::after {
      opacity: 1;
    }

    #mp-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin: 8px auto 0;
    }

    #mp-icon:hover {
      background: var(--violet-neon);
      box-shadow: var(--glow);
    }

    #spaces-panel {
      background: var(--bg-side);
      border-right: 1px solid rgba(124, 58, 237, 0.2);
      padding: 16px;
      overflow-y: auto;
    }

    #spaces-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    }

    #spaces-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--violet-neon-3);
    }

    .space-category {
      margin-bottom: 16px;
    }

    .space-category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .space-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .space-item:hover, .space-item.active {
      background: rgba(124, 58, 237, 0.2);
      color: var(--violet-neon-3);
    }

    .space-item i {
      margin-right: 12px;
      font-size: 1.1rem;
    }

    #chat-panel {
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-header i {
      color: var(--violet-neon-3);
      font-size: 1.2rem;
    }

    #chat-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    #messages-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-input);
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .message-avatar:hover {
      transform: scale(1.1);
    }

    .message-content {
      flex: 1;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message-username {
      font-weight: 700;
      color: var(--violet-neon-3);
    }

    .message-timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .message-text {
      line-height: 1.5;
    }

    #message-input-container {
      padding: 16px 20px;
      background: var(--bg-chat);
      border-top: 1px solid rgba(124, 58, 237, 0.2);
    }

    #message-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #message-input:focus {
      border-color: var(--violet-neon);
      box-shadow: var(--glow);
    }

    #members-panel {
      background: var(--bg-side);
      border-left: 1px solid rgba(124, 58, 237, 0.2);
      padding: 16px;
      overflow-y: auto;
    }

    #members-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    }

    #members-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--violet-neon-3);
    }

    .member-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: var(--radius);
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .member-item:hover {
      background: rgba(124, 58, 237, 0.2);
    }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-input);
      margin-right: 12px;
      position: relative;
    }

    .member-status {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg-side);
    }

    .member-status.online {
      background: var(--green);
    }

    .member-status.offline {
      background: var(--text-muted);
    }

    .member-username {
      flex: 1;
      font-size: 0.9rem;
    }

    .member-pronouns {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(124, 58, 237, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #soundboard-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--violet-neon);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: var(--glow);
      transition: transform 0.2s;
      z-index: 100;
    }

    #soundboard-btn:hover {
      transform: scale(1.1);
    }

    #soundboard-panel {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: var(--bg-side);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      display: none;
      gap: 8px;
      z-index: 100;
    }

    .sound-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-input);
      color: var(--violet-neon-3);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .sound-btn:hover {
      background: var(--violet-neon);
      color: white;
      transform: scale(1.1);
    }

    /* ── Auth ───────────────────────────────────────────────────── */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      grid-column: 1 / -1;
    }

    .auth-card {
      background: var(--bg-side);
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    .auth-card h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--violet-neon-3);
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-card p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: var(--bg-input);
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      transition: 0.2s;
    }

    .auth-tab.active {
      background: var(--violet-neon);
      color: white;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .field input, .field select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1.5px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: var(--violet-neon);
      box-shadow: var(--glow);
    }

    .field select option {
      background: var(--bg-input);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--violet-neon);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--violet-neon-2);
      box-shadow: var(--glow);
    }

    /* ── Profile Panel ──────────────────────────────────────────── */
    #profile-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      background: var(--bg-side);
      border-left: 1px solid rgba(124, 58, 237, 0.2);
      transform: translateX(100%);
      transition: transform 0.3s;
      z-index: 150;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    #profile-panel.active {
      transform: translateX(0);
    }

    #profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    #profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg-input);
      margin-bottom: 12px;
      position: relative;
    }

    #profile-status {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--bg-side);
      position: absolute;
      bottom: 4px;
      right: 4px;
    }

    #profile-username {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--violet-neon-3);
      margin-bottom: 4px;
    }

    #profile-pronouns {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: rgba(124, 58, 237, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .profile-section {
      margin-bottom: 24px;
    }

    .profile-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .profile-field {
      margin-bottom: 12px;
    }

    .profile-field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .profile-field input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
    }

    #close-profile {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1>NEXUS</h1>
      <p>Bienvenue dans l'espace inclusif</p>
      
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>
      
      <div id="login-form">
        <div class="field">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="login-btn">Se connecter</button>
      </div>
      
      <div id="register-form" style="display: none;">
        <div class="field">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" autocomplete="username">
        </div>
        <div class="field">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="register-pronouns">Pronoms</label>
          <select id="register-pronouns">
            <option value="iel">iel</option>
            <option value="il">il</option>
            <option value="elle">elle</option>
            <option value="iel/il">iel/il</option>
            <option value="iel/elle">iel/elle</option>
            <option value="autre">autre</option>
          </select>
        </div>
        <button class="btn-primary" id="register-btn">S'inscrire</button>
      </div>
    </div>
  </div>

  <!-- Main App Layout -->
  <div id="hubs-bar">
    <div id="hubs-list"></div>
    <div id="mp-icon" title="Messages privés">💬</div>
  </div>

  <div id="spaces-panel">
    <div id="spaces-header">
      <h2>ESPACES</h2>
      <button id="create-space-btn" style="background: none; border: none; color: var(--violet-neon-3); cursor: pointer;">+</button>
    </div>
    <div id="spaces-list"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <i>#</i>
      <h2 id="current-space-name">sélectionnez un espace</h2>
    </div>
    <div id="messages-container"></div>
    <div id="message-input-container">
      <input type="text" id="message-input" placeholder="Envoyer un message..." autocomplete="off">
    </div>
  </div>

  <div id="members-panel">
    <div id="members-header">
      <h2>MEMBRES</h2>
    </div>
    <div id="members-list"></div>
  </div>

  <!-- Soundboard -->
  <button id="soundboard-btn" title="Soundboard">🎵</button>
  <div id="soundboard-panel">
    <button class="sound-btn" data-sound="airhorn">🎺</button>
    <button class="sound-btn" data-sound="bruh">😒</button>
    <button class="sound-btn" data-sound="laugh">😂</button>
    <button class="sound-btn" data-sound="sad">😢</button>
    <button class="sound-btn" data-sound="vine-boom">💥</button>
    <button class="sound-btn" data-sound="windows-xp">🪟</button>
  </div>

  <!-- Profile Panel -->
  <div id="profile-panel">
    <button id="close-profile">×</button>
    <div id="profile-header">
      <div id="profile-avatar">
        <div id="profile-status" class="online"></div>
      </div>
      <div id="profile-username">Utilisateur</div>
      <div id="profile-pronouns">iel</div>
    </div>
    <div class="profile-section">
      <h3>Statut</h3>
      <div class="profile-field">
        <select id="profile-status-select">
          <option value="online">En ligne</option>
          <option value="idle">Inactif</option>
          <option value="dnd">Ne pas déranger</option>
          <option value="offline">Invisible</option>
        </select>
      </div>
    </div>
    <div class="profile-section">
      <h3>Compte</h3>
      <div class="profile-field">
        <label>Pseudo</label>
        <input type="text" id="profile-username-input" disabled>
      </div>
      <div class="profile-field">
        <label>Pronoms</label>
        <input type="text" id="profile-pronouns-input">
      </div>
    </div>
  </div>

  <script>
    // Socket.io logic remains unchanged
    const socket = io();
    let currentUser = null;
    let currentHub = null;
    let currentSpace = null;

    // Auth logic
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('login-form').style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
      });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      socket.emit('login', { username, password });
    });

    document.getElementById('register-btn').addEventListener('click', () => {
      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const pronouns = document.getElementById('register-pronouns').value;
      socket.emit('register', { username, password, pronouns });
    });

    socket.on('auth-success', (user) => {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      loadHubs();
      updateProfilePanel();
    });

    socket.on('auth-error', (error) => {
      alert(error);
    });

    // Hubs logic
    function loadHubs() {
      socket.emit('get-hubs');
    }

    socket.on('hubs-list', (hubs) => {
      const hubsList = document.getElementById('hubs-list');
      hubsList.innerHTML = '';
      
      hubs.forEach(hub => {
        const hubIcon = document.createElement('div');
        hubIcon.className = `hub-icon ${currentHub === hub.id ? 'active' : ''}`;
        hubIcon.title = hub.name;
        hubIcon.innerHTML = hub.icon ? `<img src="${hub.icon}" alt="${hub.name}" style="width: 100%; height: 100%; border-radius: 50%;">` : hub.name.charAt(0);
        hubIcon.addEventListener('click', () => {
          currentHub = hub.id;
          currentSpace = null;
          document.querySelectorAll('.hub-icon').forEach(icon => icon.classList.remove('active'));
          hubIcon.classList.add('active');
          loadSpaces(hub.id);
          document.getElementById('current-space-name').textContent = hub.name;
          document.getElementById('messages-container').innerHTML = '';
        });
        hubsList.appendChild(hubIcon);
      });
    });

    // Spaces logic
    function loadSpaces(hubId) {
      socket.emit('get-spaces', hubId);
    }

    socket.on('spaces-list', (spaces) => {
      const spacesList = document.getElementById('spaces-list');
      spacesList.innerHTML = '';
      
      spaces.forEach(space => {
        const spaceCategory = document.createElement('div');
        spaceCategory.className = 'space-category';
        
        const categoryHeader = document.createElement('div');
        categoryHeader.className = 'space-category-header';
        categoryHeader.textContent = space.category;
        spaceCategory.appendChild(categoryHeader);
        
        space.channels.forEach(channel => {
          const spaceItem = document.createElement('div');
          spaceItem.className = `space-item ${currentSpace === channel.id ? 'active' : ''}`;
          spaceItem.innerHTML = `<i>#</i> ${channel.name}`;
          spaceItem.addEventListener('click', () => {
            currentSpace = channel.id;
            document.querySelectorAll('.space-item').forEach(item => item.classList.remove('active'));
            spaceItem.classList.add('active');
            document.getElementById('current-space-name').textContent = `#${channel.name}`;
            loadMessages(channel.id);
          });
          spaceCategory.appendChild(spaceItem);
        });
        
        spacesList.appendChild(spaceCategory);
      });
    });

    // Messages logic
    function loadMessages(spaceId) {
      socket.emit('join-space', spaceId);
      socket.emit('get-messages', spaceId);
    }

    socket.on('messages-list', (messages) => {
      const messagesContainer = document.getElementById('messages-container');
      messagesContainer.innerHTML = '';
      
      messages.forEach(message => {
        const messageElement = document.createElement('div');
        messageElement.className = 'message';
        messageElement.innerHTML = `
          <img src="${message.avatar}" alt="${message.username}" class="message-avatar">
          <div class="message-content">
            <div class="message-header">
              <span class="message-username">${message.username}</span>
              <span class="message-timestamp">${new Date(message.created_at).toLocaleString()}</span>
            </div>
            <div class="message-text">${message.content}</div>
          </div>
        `;
        messagesContainer.appendChild(messageElement);
      });
      
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });

    socket.on('new-message', (message) => {
      if (message.channel_id === currentSpace) {
        const messagesContainer = document.getElementById('messages-container');
        const messageElement = document.createElement('div');
        messageElement.className = 'message';
        messageElement.innerHTML = `
          <img src="${message.avatar}" alt="${message.username}" class="message-avatar">
          <div class="message-content">
            <div class="message-header">
              <span class="message-username">${message.username}</span>
              <span class="message-timestamp">${new Date(message.created_at).toLocaleString()}</span>
            </div>
            <div class="message-text">${message.content}</div>
          </div>
        `;
        messagesContainer.appendChild(messageElement);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
    });

    document.getElementById('message-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && currentSpace) {
        const content = e.target.value.trim();
        if (content) {
          socket.emit('send-message', { channelId: currentSpace, content });
          e.target.value = '';
        }
      }
    });

    // Members logic
    socket.on('members-list', (members) => {
      const membersList = document.getElementById('members-list');
      membersList.innerHTML = '';
      
      members.forEach(member => {
        const memberItem = document.createElement('div');
        memberItem.className = 'member-item';
        memberItem.innerHTML = `
          <div class="member-avatar">
            <img src="${member.avatar}" alt="${member.username}" style="width: 100%; height: 100%; border-radius: 50%;">
            <div class="member-status ${member.status}"></div>
          </div>
          <span class="member-username">${member.username}</span>
          <span class="member-pronouns">${member.pronouns}</span>
        `;
        membersList.appendChild(memberItem);
      });
    });

    // Soundboard logic
    document.getElementById('soundboard-btn').addEventListener('click', () => {
      const panel = document.getElementById('soundboard-panel');
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    });

    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sound = btn.dataset.sound;
        socket.emit('play-sound', { sound, channelId: currentSpace });
      });
    });

    // Profile logic
    document.querySelectorAll('.message-avatar').forEach(avatar => {
      avatar.addEventListener('click', () => {
        document.getElementById('profile-panel').classList.add('active');
      });
    });

    document.getElementById('close-profile').addEventListener('click', () => {
      document.getElementById('profile-panel').classList.remove('active');
    });

    function updateProfilePanel() {
      if (!currentUser) return;
      
      document.getElementById('profile-avatar').innerHTML = `<img src="${currentUser.avatar}" alt="${currentUser.username}" style="width: 100%; height: 100%; border-radius: 50%;">`;
      document.getElementById('profile-status').className = currentUser.status;
      document.getElementById('profile-username').textContent = currentUser.username;
      document.getElementById('profile-pronouns').textContent = currentUser.pronouns;
      document.getElementById('profile-username-input').value = currentUser.username;
      document.getElementById('profile-pronouns-input').value = currentUser.pronouns;
      document.getElementById('profile-status-select').value = currentUser.status;
    }

    document.getElementById('profile-status-select').addEventListener('change', (e) => {
      const status = e.target.value;
      socket.emit('update-status', status);
    });

    document.getElementById('profile-pronouns-input').addEventListener('change', (e) => {
      const pronouns = e.target.value;
      socket.emit('update-pronouns', pronouns);
    });
  </script>
</body>
</html>
