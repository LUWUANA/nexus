<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Clone Discord Ultra-Inclusif</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #2d1b69;
      --neon-purple: #9d00ff;
      --neon-blue: #00d4ff;
      --dark-bg: #120f1a;
      --light-text: #e0e0e0;
      --online: #3ba55d;
      --offline: #747f8d;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: var(--dark-bg);
      color: var(--light-text);
      display: grid;
      grid-template-columns: 80px 240px 1fr 240px;
      grid-template-rows: 100vh;
      overflow: hidden;
    }
    /* Sidebar gauche */
    .sidebar {
      background-color: var(--deep-purple);
      grid-column: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 8px;
    }
    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: var(--neon-purple);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .server-icon:hover {
      transform: scale(1.1);
    }
    /* Server list */
    .server-list {
      grid-column: 2;
      background-color: #1e1a3a;
      padding: 16px 0;
      overflow-y: auto;
    }
    .server-item {
      padding: 8px 16px;
      margin: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .server-item:hover {
      background-color: rgba(157, 0, 255, 0.2);
    }
    /* Main content */
    .main-content {
      grid-column: 3;
      display: grid;
      grid-template-rows: 60px 1fr 68px;
      background-color: #18152a;
    }
    .channel-header {
      grid-row: 1;
      background-color: var(--deep-purple);
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    }
    .messages {
      grid-row: 2;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 12px;
    }
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--neon-blue);
    }
    .message-content {
      flex: 1;
    }
    .message-username {
      font-weight: bold;
      color: var(--neon-blue);
    }
    .message-timestamp {
      color: #747f8d;
      font-size: 0.8rem;
    }
    .message-input {
      grid-row: 3;
      padding: 16px;
      background-color: var(--deep-purple);
      display: flex;
      gap: 8px;
    }
    .message-input input {
      flex: 1;
      padding: 12px;
      border-radius: 4px;
      border: none;
      background-color: #2d1b69;
      color: var(--light-text);
    }
    /* Right sidebar */
    .right-sidebar {
      grid-column: 4;
      background-color: #1e1a3a;
      padding: 16px;
      overflow-y: auto;
    }
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .member-item:hover {
      background-color: rgba(157, 0, 255, 0.2);
    }
    .member-status {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--offline);
    }
    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--neon-blue);
    }
    /* User panel */
    .user-panel {
      grid-column: 1 / span 3;
      grid-row: 3;
      background-color: var(--deep-purple);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.2);
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--neon-purple);
    }
    .user-info {
      flex: 1;
    }
    .user-username {
      font-weight: bold;
    }
    .user-status-input {
      background-color: #2d1b69;
      color: var(--light-text);
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.8rem;
      width: 100%;
    }
    /* Private messages modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background-color: var(--deep-purple);
      width: 400px;
      max-height: 80vh;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-input {
      padding: 16px;
      display: flex;
      gap: 8px;
    }
    .modal-input input {
      flex: 1;
      padding: 12px;
      border-radius: 4px;
      border: none;
      background-color: #2d1b69;
      color: var(--light-text);
    }
    .status-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 6px;
      background-color: rgba(157, 0, 255, 0.3);
      border-radius: 4px;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <!-- Sidebar gauche -->
  <div class="sidebar">
    <div class="server-icon">
      <i class="fas fa-plus"></i>
    </div>
    <div class="server-icon">
      <i class="fas fa-home"></i>
    </div>
  </div>

  <!-- Server list -->
  <div class="server-list">
    <div class="server-item">
      <div class="server-icon" style="width: 32px; height: 32px; border-radius: 8px;">N</div>
      <span>Nexus Officiel</span>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <div class="channel-header">
      <i class="fas fa-hashtag"></i>
      <span>général</span>
    </div>
    <div class="messages" id="messages">
      <!-- Messages will be inserted here -->
    </div>
    <div class="message-input">
      <input type="text" placeholder="Envoyer un message..." id="messageInput">
      <button id="sendMessage"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Right sidebar -->
  <div class="right-sidebar">
    <h3>Membres en ligne</h3>
    <div class="member-list" id="memberList">
      <!-- Members will be inserted here -->
    </div>
  </div>

  <!-- User panel -->
  <div class="user-panel">
    <img src="" alt="Avatar" class="user-avatar" id="userAvatar">
    <div class="user-info">
      <div class="user-username" id="userUsername"></div>
      <input type="text" class="user-status-input" placeholder="Définir un statut..." id="userStatusInput">
    </div>
    <i class="fas fa-cog"></i>
  </div>

  <!-- Private messages modal -->
  <div class="modal" id="privateMsgModal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="privateMsgUsername"></span>
        <button id="closePrivateMsg"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-messages" id="privateMessages">
        <!-- Private messages will be inserted here -->
      </div>
      <div class="modal-input">
        <input type="text" placeholder="Envoyer un message privé..." id="privateMessageInput">
        <button id="sendPrivateMessage"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Auth
    const token = localStorage.getItem('nexus_token');
    const userId = localStorage.getItem('nexus_userId');
    if (!token || !userId) {
      window.location.href = '/login.html';
    }

    const socket = io({
      auth: { token }
    });

    // DOM elements
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendMessageBtn = document.getElementById('sendMessage');
    const memberListEl = document.getElementById('memberList');
    const userAvatar = document.getElementById('userAvatar');
    const userUsername = document.getElementById('userUsername');
    const userStatusInput = document.getElementById('userStatusInput');
    const privateMsgModal = document.getElementById('privateMsgModal');
    const privateMsgUsername = document.getElementById('privateMsgUsername');
    const privateMessagesEl = document.getElementById('privateMessages');
    const privateMessageInput = document.getElementById('privateMessageInput');
    const sendPrivateMessageBtn = document.getElementById('sendPrivateMessage');
    const closePrivateMsgBtn = document.getElementById('closePrivateMsg');

    let currentPrivateChat = null;

    // Fetch user data
    fetch('/api/user', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(user => {
      userAvatar.src = user.avatar;
      userUsername.textContent = user.username;
      if (user.customStatus) {
        userStatusInput.value = user.customStatus;
      }
    });

    // Messages
    sendMessageBtn.addEventListener('click', () => {
      const content = messageInput.value.trim();
      if (content) {
        socket.emit('message', { content });
        messageInput.value = '';
      }
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessageBtn.click();
      }
    });

    socket.on('message', (message) => {
      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      messageEl.innerHTML = `
        <img src="${message.avatar}" alt="Avatar" class="message-avatar">
        <div class="message-content">
          <div>
            <span class="message-username">${message.username}</span>
            <span class="message-timestamp">${new Date(message.created_at).toLocaleTimeString()}</span>
          </div>
          <div>${message.content}</div>
        </div>
      `;
      messagesEl.appendChild(messageEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    // Members list
    socket.on('user-status', (users) => {
      memberListEl.innerHTML = '';
      users.forEach(user => {
        const memberEl = document.createElement('div');
        memberEl.className = 'member-item';
        memberEl.innerHTML = `
          <div class="member-status" style="background-color: ${user.status === 'online' ? 'var(--online)' : 'var(--offline)'}"></div>
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(user.username)}" alt="Avatar" class="member-avatar">
          <span>${user.username}</span>
          ${user.customStatus ? `<span class="status-badge">${user.customStatus}</span>` : ''}
        `;
        memberEl.addEventListener('click', () => openPrivateChat(user));
        memberListEl.appendChild(memberEl);
      });
    });

    // User status
    userStatusInput.addEventListener('change', () => {
      const status = userStatusInput.value.trim();
      socket.emit('update-status', { customStatus: status });
    });

    // Private messages
    function openPrivateChat(user) {
      currentPrivateChat = user.userId;
      privateMsgUsername.textContent = user.username;
      privateMessagesEl.innerHTML = '';
      privateMsgModal.style.display = 'flex';

      // Fetch previous messages
      fetch(`/api/private-messages/${user.userId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(messages => {
        messages.forEach(msg => {
          displayPrivateMessage(msg);
        });
      });
    }

    function displayPrivateMessage(message) {
      const isMe = message.from === parseInt(userId);
      const messageEl = document.createElement('div');
      messageEl.className = 'message';
      messageEl.style.justifyContent = isMe ? 'flex-end' : 'flex-start';
      messageEl.innerHTML = `
        <div class="message-content" style="background-color: ${isMe ? 'var(--neon-purple)' : '#2d1b69'}; border-radius: 8px; padding: 8px 12px; max-width: 80%;">
          <div>${message.content}</div>
          <div class="message-timestamp" style="text-align: ${isMe ? 'right' : 'left'}">${new Date(message.created_at).toLocaleTimeString()}</div>
        </div>
      `;
      privateMessagesEl.appendChild(messageEl);
      privateMessagesEl.scrollTop = privateMessagesEl.scrollHeight;
    }

    sendPrivateMessageBtn.addEventListener('click', () => {
      const content = privateMessageInput.value.trim();
      if (content && currentPrivateChat) {
        socket.emit('private-msg', { to: currentPrivateChat, content });
        privateMessageInput.value = '';
      }
    });

    privateMessageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendPrivateMessageBtn.click();
      }
    });

    socket.on('private-msg', (message) => {
      if (message.from === currentPrivateChat || message.to === currentPrivateChat) {
        displayPrivateMessage(message);
      }
    });

    closePrivateMsgBtn.addEventListener('click', () => {
      privateMsgModal.style.display = 'none';
      currentPrivateChat = null;
    });
  </script>
</body>
</html>
