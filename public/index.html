<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Hubs Inclusifs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --input-bg: #1e1e2e;
      --input-text: #dbdee1;
      --input-placeholder: #6c7284;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #0d0d1a, #1a0a2e, #0d1a2e, #1a0a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(168, 85, 247, 0.5);
      border-radius: 50%;
      opacity: 0;
      animation: float 15s infinite ease-in;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .auth-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .nexus-logo {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: var(--glow-active);
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: var(--glow-active); }
      to { text-shadow: 0 0 20px var(--pink-neon); }
    }

    .welcome-message {
      font-size: 1.2rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      text-align: center;
      max-width: 500px;
    }

    .auth-container {
      background: rgba(20, 20, 40, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 16px;
      padding: 40px;
      width: 500px;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.2);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(124, 58, 237, 0.3);
    }

    .auth-tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.3s;
    }

    .auth-tab.active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--violet-neon);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 8px;
      color: var(--input-text);
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input::placeholder {
      color: var(--input-placeholder);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--violet-neon);
    }

    .auth-button {
      width: 100%;
      padding: 12px;
      background: var(--violet-neon);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .auth-button:hover {
      background: var(--pink-neon);
    }

    .auth-footer {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--violet-neon);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="auth-screen">
    <h1 class="nexus-logo">NEXUS</h1>
    <p class="welcome-message">Rejoins des hubs inclusifs où chaque voix compte.</p>

    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>

      <form class="auth-form active" id="login-form">
        <div class="form-group">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Ton pseudo" required>
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Ton mot de passe" required>
        </div>
        <button type="submit" class="auth-button">Se connecter</button>
      </form>

      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisis un pseudo" required>
        </div>
        <div class="form-group">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Crée un mot de passe" required>
        </div>
        <div class="form-group">
          <label for="register-pronouns">Pronoms (optionnel)</label>
          <input type="text" id="register-pronouns" placeholder="iel/iel·le/...">
        </div>
        <button type="submit" class="auth-button">S'inscrire</button>
      </form>

      <div class="auth-footer">
        <a href="#">Besoin d'aide ?</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Particles background
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 8 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = Math.random() * 10 + 10 + 's';
        particlesContainer.appendChild(particle);
      }

      // Auth tabs
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          forms.forEach(form => form.classList.remove('active'));
          document.getElementById(tab.dataset.tab + '-form').classList.add('active');
        });
      });

      // Login form
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        
        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });
          
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem('nexus_token', data.token);
            loadMainInterface();
          } else {
            alert(data.error || 'Échec de la connexion');
          }
        } catch (error) {
          console.error('Erreur:', error);
          alert('Une erreur est survenue');
        }
      });

      // Register form
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const pronouns = document.getElementById('register-pronouns').value;
        
        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password, pronouns })
          });
          
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem('nexus_token', data.token);
            loadMainInterface();
          } else {
            alert(data.error || 'Échec de l\'inscription');
          }
        } catch (error) {
          console.error('Erreur:', error);
          alert('Une erreur est survenue');
        }
      });

      // Check for existing token
      if (localStorage.getItem('nexus_token')) {
        loadMainInterface();
      }

      function loadMainInterface() {
        document.querySelector('.auth-screen').style.display = 'none';
        // Socket.io logic would be initialized here
        // This is where the main app interface would load
        console.log('Chargement de l\'interface principale...');
      }
    });
  </script>
</body>
</html>
