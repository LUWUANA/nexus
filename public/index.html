<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Hubs Inclusifs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --deep-purple: #7c3aed;
      --violet-neon: #a855f7;
      --pink-neon: #e879f9;
      --dark-bg: #0d0d1a;
      --darker-bg: #12122a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --input-bg: #1e1e2e;
      --input-text: #dbdee1;
      --input-placeholder: #6c7284;
      --glow: 0 0 8px var(--violet-neon);
      --glow-active: 0 0 12px var(--pink-neon);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #0d0d1a, #1a0a2e, #0d1a2e, #1a0a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(168, 85, 247, 0.5);
      border-radius: 50%;
      opacity: 0;
      animation: float 15s infinite ease-in;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    #auth-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .nexus-logo {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: var(--glow-active);
      background: linear-gradient(90deg, var(--violet-neon), var(--pink-neon));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: var(--glow-active); }
      to { text-shadow: 0 0 20px var(--pink-neon); }
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      background: rgba(30, 30, 46, 0.6);
      border-radius: 8px;
      padding: 4px;
    }

    .auth-tab {
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 6px;
      color: var(--text-secondary);
      transition: all 0.3s;
    }

    .auth-tab.active {
      background: var(--violet-neon);
      color: white;
    }

    .auth-container {
      background: rgba(20, 20, 40, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 16px;
      padding: 40px;
      width: 500px;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.2);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group input {
      background: var(--input-bg);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--input-text);
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--violet-neon);
    }

    .pronouns-badges {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .pronoun-badge {
      background: rgba(124, 58, 237, 0.2);
      color: var(--violet-neon);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pronoun-badge.active {
      background: var(--violet-neon);
      color: white;
    }

    .auth-button {
      background: var(--violet-neon);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-button:hover {
      background: var(--pink-neon);
      transform: translateY(-2px);
    }

    .error-message {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: -1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="nexus-logo">NEXUS</div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Connexion</div>
      <div class="auth-tab" data-tab="register">Inscription</div>
    </div>
    <div class="auth-container">
      <div class="auth-form" id="login-form">
        <div class="form-group">
          <label for="login-username">Pseudo</label>
          <input type="text" id="login-username" placeholder="Entrez votre pseudo" />
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="Entrez votre mot de passe" />
        </div>
        <div class="error-message" id="login-error"></div>
        <button class="auth-button" id="login-button">Se connecter</button>
      </div>
      <div class="auth-form" id="register-form" style="display: none;">
        <div class="form-group">
          <label for="register-username">Pseudo</label>
          <input type="text" id="register-username" placeholder="Choisissez un pseudo" />
        </div>
        <div class="form-group">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="Créez un mot de passe" />
        </div>
        <div class="form-group">
          <label>Pronoms</label>
          <div class="pronouns-badges">
            <div class="pronoun-badge active" data-pronoun="iel">iel</div>
            <div class="pronoun-badge" data-pronoun="il">il</div>
            <div class="pronoun-badge" data-pronoun="elle">elle</div>
            <div class="pronoun-badge" data-pronoun="iel/il">iel/il</div>
            <div class="pronoun-badge" data-pronoun="autre">autre</div>
          </div>
        </div>
        <div class="error-message" id="register-error"></div>
        <button class="auth-button" id="register-button">S'inscrire</button>
      </div>
    </div>
  </div>

  <div class="particles" id="particles-js"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const socket = io();
      const authOverlay = document.getElementById('auth-overlay');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginTab = document.querySelector('.auth-tab[data-tab="login"]');
      const registerTab = document.querySelector('.auth-tab[data-tab="register"]');
      const pronounBadges = document.querySelectorAll('.pronoun-badge');
      let selectedPronoun = 'iel';

      // Vérifier si un token existe déjà
      const token = localStorage.getItem('nexus_token');
      if (token) {
        socket.emit('auth', { token });
        authOverlay.style.display = 'none';
      }

      // Gestion des onglets
      loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.style.display = 'flex';
        registerForm.style.display = 'none';
      });

      registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.style.display = 'flex';
        loginForm.style.display = 'none';
      });

      // Gestion des pronoms
      pronounBadges.forEach(badge => {
        badge.addEventListener('click', () => {
          pronounBadges.forEach(b => b.classList.remove('active'));
          badge.classList.add('active');
          selectedPronoun = badge.getAttribute('data-pronoun');
        });
      });

      // Connexion
      document.getElementById('login-button').addEventListener('click', async () => {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const errorElement = document.getElementById('login-error');

        if (!username || !password) {
          errorElement.textContent = 'Veuillez remplir tous les champs.';
          return;
        }

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();
          if (response.ok) {
            localStorage.setItem('nexus_token', data.token);
            socket.emit('auth', { token: data.token });
            authOverlay.style.display = 'none';
          } else {
            errorElement.textContent = data.error || 'Échec de la connexion.';
          }
        } catch (err) {
          errorElement.textContent = 'Erreur réseau. Veuillez réessayer.';
        }
      });

      // Inscription
      document.getElementById('register-button').addEventListener('click', async () => {
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const errorElement = document.getElementById('register-error');

        if (!username || !password) {
          errorElement.textContent = 'Veuillez remplir tous les champs.';
          return;
        }

        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, pronouns: selectedPronoun })
          });

          const data = await response.json();
          if (response.ok) {
            localStorage.setItem('nexus_token', data.token);
            socket.emit('auth', { token: data.token });
            authOverlay.style.display = 'none';
          } else {
            errorElement.textContent = data.error || 'Échec de l\'inscription.';
          }
        } catch (err) {
          errorElement.textContent = 'Erreur réseau. Veuillez réessayer.';
        }
      });
    });
  </script>
</body>
</html>
